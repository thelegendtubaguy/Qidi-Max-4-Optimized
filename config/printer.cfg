# MAX4 Printer Profile
# QIDI MAX4385x405x342mm printing space

# ============ External configuration files include ============

[include MCU_ID.cfg]            # MCU identification configuration

[include timelapse.cfg]         # Time-lapse photography configuration

# ============ Klipper macro library configuration ============

[gcode_macro _km_options]
# Any options variables declared here
gcode:
  # GCODE_ON_PRINT_STATUS STATUS=ready COMMAND="STATUS_TEST" ARGS=1 WHEN=ALWAYS TYPE=BOTH
  # GCODE_ON_PRINT_STATUS STATUS=leveing_calibration COMMAND="STATUS_TEST" ARGS=1 WHEN=ALWAYS TYPE=BOTH

[include klipper-macros-qd/*.cfg]

[gcode_macro status_test]
variable_extruder: 0
gcode:
  M118 STATUS_TEST {rawparams}

# ============ MCU configuration ============

[mcu THR]
serial: /dev/ttyS4
restart_method: command
baud: 500000

[respond]
default_type: echo

[save_variables]
filename = ~/printer_data/config/saved_variables.cfg

[resonance_tester]
accel_per_hz: 150
max_smoothing: 0.25
accel_chip: lis2dw
probe_points:
    195, 195, 10

# ============ Pin configuration ============

[duplicate_pin_override]
pins:

# ============ Consumables detection sensor ============

[filament_switch_sensor filament_switch_sensor]
pause_on_runout: True
runout_gcode:
            M118 Filament run out
            {% set enable_box = printer.save_variables.variables.enable_box|default(0) %}
            {% if enable_box == 1 %}
              {% set can_auto_reload = printer.save_variables.variables.auto_reload_detect|default(0) %}
              {% if can_auto_reload == 1 %}
                AUTO_RELOAD_FILAMENT
              {% else %}
                SET_PRINT_SUB_STATUS SUB_STATUS=box_filament_exhausted
              {% endif %}
            {% else %}
              SET_PRINT_SUB_STATUS SUB_STATUS=ext_filament_exhausted
            {% endif %}
insert_gcode: # Code executed when inserting consumables
event_delay: 3.0          # event delay time
pause_delay: 0.5          # pause delay time
switch_pin: !THR:PA0       # Detect switch pin

# ============ Bed screw leveling position ============

[bed_screws]
screw1: 30,30              # Front left screw
screw1_name: Front left
screw2: 345,30            # Front right screw
screw2_name: Front right
screw3: 345,345           # Rear right screw
screw3_name: Last right
screw4: 30,345            # Rear left screw

[screws_tilt_adjust]
screw1: 30,30
screw1_name: Front left
screw2: 345,30
screw2_name: Front right
screw3: 345,345
screw3_name: Rear right
screw4: 30,345
screw4_name: Rear left
horizontal_move_z: 5
speed: 600
screw_thread: CW-M4

# ============ Forced mobile configuration ============

[force_move]
enable_force_move: True

# ============ Extruder configuration ============

[extruder]
step_pin: THR:PB9
dir_pin: THR:PB8
enable_pin: !THR:PC15
rotation_distance: 53.7
gear_ratio: 1517:170
microsteps: 16
full_steps_per_rotation: 200

nozzle_diameter: 0.400
filament_diameter: 1.75
min_temp: 0
max_temp: 375
min_extrude_temp: 135
smooth_time: 0.1

heater_pin: THR:PB15
sensor_type: MAX6675
sensor_pin: THR:PB12
spi_bus: spi2
spi_speed: 2000000
max_power: 1

# PIDs controlling extruder heater
control: pid
pid_Kp = 28.335
pid_Ki = 3.373
pid_Kd = 59.504

pressure_advance: 0.032
pressure_advance_smooth_time: 0.03
max_extrude_cross_section: 500
instantaneous_corner_velocity: 10.000
max_extrude_only_distance: 1000.0
max_extrude_only_velocity: 5000
max_extrude_only_accel: 5000

[tmc2209 extruder]
uart_pin: THR:PC13
interpolate: True
run_current: 0.428
stealthchop_threshold: 0

[lis2dw]
cs_pin: THR:PA10
spi_software_sclk_pin: THR:PA5
spi_software_mosi_pin: THR:PA7
spi_software_miso_pin: THR:PA6
axes_map: y, z, -x

[printer]

kinematics: corexy
max_velocity: 800
max_accel: 30000
max_z_velocity: 10
max_z_accel: 150
square_corner_velocity: 8

[cl_interface]
mcu = mcu
addr = 0

[closed_loop x]
addr = 1
run_current = 1200
hold_current = 800
home_current = 700
microstep: 32
query_cycle: 5
homing_trigger_sval: 400
homing_trigger_eval: 4
debug_mode: false

[closed_loop y]
addr = 3
run_current = 1200
hold_current = 800
home_current = 700
microstep: 32
query_cycle: 5
homing_trigger_sval: 400
homing_trigger_eval: 4
debug_mode: false

[stepper_x]
step_pin: PC14
dir_pin: !PC13
enable_pin: !PC15
microsteps: 32
rotation_distance: 39
full_steps_per_rotation: 200
endstop_pin: !PC0
position_min: -2
position_endstop: 392.0
position_max: 392.0
homing_speed: 65
homing_retract_dist: 20.0
homing_retract_speed: 1000.0
second_homing_speed: 55.0
homing_tolerance: 1
homing_retries: 10
homing_positive_dir: True

[stepper_y]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB5
microsteps: 32
rotation_distance: 39
full_steps_per_rotation: 200

endstop_pin: !PB8
position_min: -5.0
position_endstop: -1.0
position_max: 410
homing_speed: 65
homing_retract_dist: 20.0
homing_retract_speed: 1000.0
second_homing_speed: 55.0
homing_tolerance: 1
homing_retries: 10
homing_positive_dir: false
#step_pulse_duration:0.0000001

[stepper_z]
step_pin: PC10
dir_pin: !PA15
enable_pin: !PC11
microsteps: 128
rotation_distance: 2
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
endstop_pin_reverse: tmc2209_stepper_z:virtual_endstop
#position_endstop:0
position_endstop_reverse: 340
position_max: 342
position_min: -5
homing_speed: 8
second_homing_speed: 5
homing_retract_dist: 5.0
homing_positive_dir: false
homing_positive_dir_reverse: true
#step_pulse_duration:0.0000001

[stepper_z1]
step_pin: PB1
dir_pin: !PB6
enable_pin: !PB0
microsteps: 128
rotation_distance: 2
full_steps_per_rotation: 200
endstop_pin_reverse: tmc2209_stepper_z1:virtual_endstop
#step_pulse_duration:0.0000001

[z_tilt]
z_positions:
    -16.5,202.5
    406.5,202.5

points:
    15,202.5
    375,202.5

speed: 600
horizontal_move_z: 5
retries: 4
retry_tolerance: 0.05

[tmc2209 stepper_z]
uart_pin: PC5
run_current: 1.07
#hold_current: 0.17
interpolate: True
stealthchop_threshold: 9999999999
diag_pin: ^PC1
driver_SGTHRS: 130

[tmc2209 stepper_z1]
uart_pin: PB7
run_current: 1.07
#hold_current: 0.17
interpolate: True
stealthchop_threshold: 9999999999
diag_pin: ^PA13
driver_SGTHRS: 130

[heater_bed]
heater_pin: PB10
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA1
max_power: 0.7
control = pid
pid_Kp = 63.418
pid_Ki = 1.342
pid_Kd = 749.125
pwm_cycle_time: 0.1
min_temp: -100
max_temp: 125

[heater_generic chamber]
heater_pin: PC8
max_power: 1
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA4
control = pid
pid_Kp = 63.418
pid_Ki = 1.342
pid_Kd = 749.125
min_temp: -100
max_temp: 68

[verify_heater chamber]
max_error: 300
check_gain_time: 480
hysteresis: 5
heating_gain: 1

[temperature_sensor Chamber_Thermal_Protection_Sensor]
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA2
min_temp: -100
max_temp: 140

[verify_heater extruder]
max_error: 120
check_gain_time: 20
hysteresis: 2
heating_gain: 2

[verify_heater heater_bed]
max_error: 400
check_gain_time: 120
hysteresis: 2
heating_gain: 1

[fan_generic chamber_circulation_fan]
pin: PA9
shutdown_speed: 0.0
cycle_time: 0.0100
hardware_pwm: false
kick_start_time: 0.100
off_below: 0.0

[controller_fan chamber_fan]
pin: PB14
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
heater: chamber
fan_speed: 1.0
off_below: 0
tachometer_pin: PC6
tachometer_ppr: 2
tachometer_poll_interval: 0.0015
stepper:

[heater_fan hotend_fan]
pin: THR:PA15
max_power: 1.0
shutdown_speed: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0
off_below: 0
tachometer_pin: THR:PB5
tachometer_ppr: 2
tachometer_poll_interval: 0.0015

[fan_generic cooling_fan]
pin: THR:PA8
max_power: 1.0
shutdown_speed: 0
cycle_time: 0.010
hardware_pwm: False
kick_start_time: 0.100
off_below: 0.0
tachometer_pin: THR:PA9
tachometer_ppr: 2
tachometer_poll_interval: 0.0015

[controller_fan board_fan]
pin: PC9
max_power: 1.0
shutdown_speed: 1.0
cycle_time: 0.01
fan_speed: 0.9
idle_timeout: 120
stepper: stepper_z,stepper_z1

[fan_generic auxiliary_cooling_fan]
pin: PB15
shutdown_speed: 0.0
cycle_time: 0.0100
hardware_pwm: false
kick_start_time: 0.100
off_below: 0.0
tachometer_pin: PC4
tachometer_ppr: 2
tachometer_poll_interval: 0.0015

[fan_generic auxiliary_cooling_fan2]
pin: PA8
shutdown_speed: 0.0
cycle_time: 0.0100
hardware_pwm: false
kick_start_time: 0.100
off_below: 0.0
tachometer_pin: PB12
tachometer_ppr: 2
tachometer_poll_interval: 0.0015

[output_pin Polar_cooler]
pin: PA14
pwm: false
shutdown_value: 0
value: 0

[output_pin beeper]
pin: PC2
pwm: false
shutdown_value: 0
value: 0

[output_pin caselight]
pin: PC7
pwm: false
shutdown_value: 0
value: 1

[gcode_arcs]
resolution: 1.0

[neopixel RGB]
pin: PA10
#   Connect to the neopixel's pin.
#   This parameter is required.
chain_count: 25
#   Number of neopixel chips in the daisy chain.
#   The default is 1 (meaning there is a neopixel chip connected to this pin).
color_order: GRB
#   Set the RGB pixel order of the LED hardware (provide a sequence containing the letters R (red), G (green)
#   , strings of B (blue) and W (white), W is optional). Or you can use a
#   Comma separated list of characters describing pixel order.
#   The default is GRB.
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0

[probe_air]
sensor_type: c_sensor
sclk_pin: THR:PB3
dout_pin: THR: PB4
voltage: 4.95
delta_v: 0.08
z_offset: -0.05
speed: 5
lift_speed: 5
samples: 2
sample_retract_dist: 3
samples_result: average
samples_tolerance: 0.02
samples_tolerance_retries: 10

# [motion_accuracy_calibration]
# sampling_points_x: 8
# sampling_points_y: 8
# grid_target: 22
# algo: rbf
# if_compensate_xy: true #enabled by default
# spacing: 50
# gain_x: 1.0
# gain_y: 1.0
# low_height: -1.2
# high_height: 5.

[bed_mesh]
speed: 600
horizontal_move_z: 5
mesh_min: 15,15
mesh_max: 375,375
probe_count: 9,9
algorithm: bicubic
bicubic_tension: 0.2
mesh_pps: 2, 2
fade_start: 1
fade_end: 8

[idle_timeout]
timeout: 43200
gcode:
    M118 Pause Timeout: Turn off heaters
    #PRINT_END
    M106 S0
    M104 S0
    M140 S0
    M141 S0
    DISABLE_BOX_HEATER
    _KM_IDLE_TIMEOUT

[pause_resume]

[display_status]

[exclude_object]

[print_stats_manager]

[virtual_sdcard]
path: ~/printer_data/gcodes  # G code file path
on_error_gcode: CANCEL_PRINT # Cancel printing on error


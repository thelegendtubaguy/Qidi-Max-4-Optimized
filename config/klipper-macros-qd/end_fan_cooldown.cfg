[gcode_macro END_FAN_COOLDOWN]
description: Run chamber fan P3 after print and stop later.
variable_speed: 0
gcode:
  {% set speed = params.S|default(120)|int %}
  {% set duration = params.T|default(180)|int %}
  {% set speed = [0, [speed, 255]|min]|max %}
  {% set duration = [0, duration]|max %}

  UPDATE_DELAYED_GCODE ID=_end_fan_cooldown_off DURATION=0
  {% if speed > 0 and duration > 0 %}
    M106 P3 S{speed}
    SET_GCODE_VARIABLE MACRO=END_FAN_COOLDOWN VARIABLE=speed VALUE={speed}
    UPDATE_DELAYED_GCODE ID=_end_fan_cooldown_off DURATION={duration}
  {% else %}
    M106 P3 S0
    SET_GCODE_VARIABLE MACRO=END_FAN_COOLDOWN VARIABLE=speed VALUE=0
  {% endif %}

[delayed_gcode _end_fan_cooldown_off]
gcode:
  M106 P3 S0
  SET_GCODE_VARIABLE MACRO=END_FAN_COOLDOWN VARIABLE=speed VALUE=0

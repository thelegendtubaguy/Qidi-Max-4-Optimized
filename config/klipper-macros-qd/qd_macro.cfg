
# =============================================================================
# QIDI MAX4 macro library - QD (QIDI) custom function module
# =============================================================================


[gcode_macro MOVE_TO_TRASH]
gcode:
#    _CG28
    {% set km = printer["gcode_macro _km_globals"] %}

    G28 O X Y  # Conditionally home X and Y (O skips already homed axes)
    M204 S10000  # Set high acceleration to 10000 mm/s² for fast moves
    {% if (printer.gcode_move.position.y) > km.print_max[1] %}
        {% if (printer.gcode_move.position.x) > 150 or (printer.gcode_move.position.x) < 120 %}
            G1 Y{km.park_y - 30} F{km.travel_speed_xy}  # Stage 1: move Y forward 30 mm for clearance
            G1 X116 F{km.travel_speed_xy}       # Stage 2: move X to the park X coordinate
            G1 Y383 F{km.travel_speed_xy}
            G1 Y{km.park_y} F2000       # Stage 3: move Y to the final trash position
            G1 X{km.park_x} F2000       # Stage 4: move X to the park X coordinate
        {% endif %}
        G1 X{km.park_x} Y{km.park_y} F{km.travel_speed_xy}
    {% else %}
        G1 Y{km.park_y - 30} F{km.travel_speed_xy}  # Stage 1: move Y forward 30 mm for clearance
        G1 X116 F{km.travel_speed_xy}       # Stage 2: move X to the park X coordinate
        G1 Y383 F{km.travel_speed_xy}
        G1 Y{km.park_y} F2000       # Stage 3: move Y to the final trash position
        G1 X{km.park_x} F2000       # Stage 4: move X to the park X coordinate
    {% endif %}


[gcode_macro ENABLE_ALL_SENSOR]
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_switch_sensor ENABLE=1
    {% if printer["filament_motion_sensor box_motion_sensor"] and printer.save_variables.variables.enable_box == 1 %}
        CLEAR_MOTION_DATA SENSOR=box_motion_sensor
    {% endif %}

[gcode_macro DISABLE_ALL_SENSOR]
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_switch_sensor ENABLE=0
    {% if printer["filament_motion_sensor box_motion_sensor"] %}
        SET_FILAMENT_SENSOR SENSOR=box_motion_sensor ENABLE=0
    {% endif %}




[gcode_macro CLEAR_NOZZLE]
gcode:
    {% set extruder_temp = params.HOTEND|default(250)|int %}
    {% set km = printer["gcode_macro _km_globals"] %}

    G1 Z20 F480
    MOVE_TO_TRASH  
    M400  
    M109 S{extruder_temp}  
    G92 E0
    G1 E5 F80
    G92 E0
    G1 E250 F300
    M400
    M106 S255

    G92 E0
    G1 E-4 F1000

    M104 S140  
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={extruder_temp-30}  


    SET_PRINT_SUB_STATUS SUB_STATUS=clear_nozzle  


    M204 S10000  

    G1 X{km.park_x + 27} F10000
    G1 X{km.park_x + 8} F6000
    G1 X{km.park_x + 27} F10000
    G1 X{km.park_x + 8} F6000

    G1 X180 F20000
    G1 Y395 F6000
    G1 X188 F6000
    G1 Z-0.2 F480


    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=150  
    M106 S255  

    G2 I0.5 J0.5 F480 
    G2 I0.5 J0.5 F480  
    G2 I0.5 J0.5 F480

    G91
    G1 X15 F200
    G1 Y2 F200
    G1 X-15 F200
    G1 Y-2 F200
    G1 X15 F200
    G90

    G2 I0.5 J0.5 F480  
    G2 I0.5 J0.5 F480
    G2 I0.5 J0.5 F480
    G1 Z10
    G1 Y383 F10000
    MOVE_TO_TRASH
    M400  # Wait for all cleanup actions to complete


    G1 X176 F12000
    G1 X163 F12000
    G1 X176 F12000
    G1 X163 F12000
    G1 X176 F12000
    G1 X163 F12000
    G1 X176 F12000
    G1 X163 F12000
    G1 X180 F12000
    M400
    M118 Nozzle cleared

    G1 Y350 F12000
    M106 S0  

    SET_PRINT_SUB_STATUS SUB_STATUS=""


#Heated-bed calibration process
[gcode_macro M4029]   
gcode:
    {% set bedtemp = params.S|default(60)|float %}
    {% set restart = params.R|default(1)|int %}  # Added restart parameter; default is 1 (restart)

    SET_PRINT_MAIN_STATUS MAIN_STATUS=leveling_calibration   # Set main status to calibration

    # === System initialization ===
    DISABLE_ALL_SENSOR  # Disable all sensors to avoid interference
#    M104 S140  # Set extruder temperature to 140°C
    M140 S{bedtemp}  # Set bed temperature (user-specified or default 60°C)
    SAVE_VARIABLE VARIABLE=z_offset VALUE=0  # Reset Z offset to 0
    SET_GCODE_OFFSET Z=0 MOVE=0  # Clear the current G-code Z offset

    M4031  
    G28   
    M400  

    CLEAR_NOZZLE HOTEND=260  
    M104 S140  # Lower temperature to 140°C
    CUT_FILAMENT_1
    SET_PRINT_SUB_STATUS SUB_STATUS=extruder_cooling  
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=140  
    CUT_FILAMENT_1
    Z_TILT_ADJUST  
    G28  
    G1 z10 F480  
    BED_MESH_CALIBRATE 

    G0 Z50 F480  
    G0 X190 Y190 F9000  
    M400  #
    SET_PRINT_MAIN_STATUS MAIN_STATUS=ready  
    M104 S0
    M140 S0
    M141 S0
    
    {% if restart == 1 %}
        SAVE_CONFIG  # Save config and restart
    {% else %}
        SAVE_CONFIG_QD  # Save config without restarting
        M104 S0
        M140 S0
        M141 S0
    {% endif %}


[gcode_macro M4031]
gcode:
    # === Status management ===
    SET_PRINT_SUB_STATUS SUB_STATUS=z_titl_homing  # Set sub-status
    SET_STEPPER_ENABLE STEPPER=stepper_z enable=1
    SET_STEPPER_ENABLE STEPPER=stepper_z1 enable=1


    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={printer.configfile.settings['tmc2209 stepper_z'].run_current * 0.8 }
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT={printer.configfile.settings['tmc2209 stepper_z1'].run_current * 0.8 }
    M400
    REVERSE_HOMING  

    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={printer.configfile.settings['tmc2209 stepper_z'].run_current}
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT={printer.configfile.settings['tmc2209 stepper_z1'].run_current}
    G91  
    G1 Z-30 F480  
    G90  


    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={printer.configfile.settings['tmc2209 stepper_z'].run_current * 0.8 }
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT={printer.configfile.settings['tmc2209 stepper_z1'].run_current * 0.8 }
    M400
    REVERSE_HOMING  

    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={printer.configfile.settings['tmc2209 stepper_z'].run_current}
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT={printer.configfile.settings['tmc2209 stepper_z1'].run_current}
    G91  
    G1 Z-30 F480  
    G90  



[gcode_macro M901]
gcode:
    {% set restart = params.R|default(1)|int %}  # Added restart parameter; default is 1 (restart)

    SET_PRINT_MAIN_STATUS MAIN_STATUS=input_shaping  
    M104 S0
    M140 S0
    M141 S0
    G28  

    SET_PRINT_SUB_STATUS SUB_STATUS=resonance

    SHAPER_CALIBRATE  
    SET_PRINT_MAIN_STATUS MAIN_STATUS=ready  

    {% if restart == 1 %}
        SAVE_CONFIG  # Save config and restart
    {% else %}
        SAVE_CONFIG_QD  # Save config without restarting
    {% endif %}
    



[gcode_macro M290]
gcode:
    SET_GCODE_OFFSET Z_ADJUST={params.Z}  # Adjust the current Z-axis offset

[gcode_macro LED_ON]
gcode:
    SET_PIN PIN=caselight VALUE=1

[gcode_macro LED_OFF]
gcode:
    SET_PIN PIN=caselight VALUE=0


[gcode_macro M1001]
description: Automatic input shaper
variable_autotune_shapers: 'mzv'
gcode:
    SET_INPUT_SHAPER SHAPER_TYPE_X={autotune_shapers}
    SET_INPUT_SHAPER SHAPER_TYPE_Y={autotune_shapers}

#Print Z_OFFSET management macro
[gcode_macro M1002]   
description: Manage Z offset    
gcode:
    _km_apply_print_offset RESET={params.R|default(0)|int} SET={params.A|default(0)|int} SAVE={params.S|default(0)|int}

[gcode_macro G29.0]
description: Clear bed mesh data
gcode:
    {% if printer.bed_mesh %}
        BED_MESH_CLEAR
    {% endif %}

[gcode_macro M1004]
description: Enable the polar cooler according to settings
gcode:
    {% set polar_cooler = printer.save_variables.variables.enable_polar_cooler|default(1) %}
    M106 P4 S{polar_cooler}                    #Enable the polar cooler according to settings




[gcode_macro M0]
gcode:
    PAUSE


[gcode_macro move_screw1]
gcode:
    G1 Z5 F600
    G1 X30 Y30 F12000
    G1 Z0 F300

[gcode_macro move_screw2]
gcode:
    G1 Z5 F600
    G1 X345 Y30 F12000
    G1 Z0 F300

[gcode_macro move_screw3]
gcode:
    G1 Z5 F600
    G1 X345 Y345 F12000
    G1 Z0 F300

[gcode_macro move_screw4]
gcode:
    G1 Z5 F600
    G1 X30 Y345 F12000
    G1 Z0 F300

[gcode_macro M4030]
gcode:    
    BED_MESH_CLEAR      
    SET_GCODE_OFFSET Z=0 MOVE=0
    M4031
    G28
    G1 X345 Y30 F9000
    G28 Z
    G1 Z0 F600

[gcode_macro M1006]
description: Set Z coordinate
gcode:
    G92 Z{params.Z}
    
    
# Run auto-leveling and input-shaping compensation in sequence

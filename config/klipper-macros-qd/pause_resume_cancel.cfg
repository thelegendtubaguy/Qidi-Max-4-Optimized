[gcode_macro pause]
description: Pauses the current print.
  Usage: PAUSE [X=<pos>] [Y=<pos>] [Z=<pos>] [E=<retract_length>] [B=<beeps>]
rename_existing: _KM_PAUSE_BASE
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}
  # Retract length (negative)
  # Filament retraction length setting (to prevent ooze)
  {% set E = (params.E|default(5))|float %}

  # === Pause state check ===
  {% if printer.pause_resume.is_paused %}
    { action_respond_info("Print already paused") }  # Prompt if already paused
  {% elif printer.idle_timeout.state | string == "Printing" or
          (printer.virtual_sdcard|default({})).is_active|default(False) %}
    # === Status management ===
    SET_PRINT_MAIN_STATUS MAIN_STATUS=pausing  # Set main status to pausing
    # === Save position and parameters ===
    {% set position = printer.gcode_move.gcode_position %}  # Get the current G-code position
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_x VALUE="{position.x}"  # Save X position
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_y VALUE="{position.y}"  # Save Y position
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_z VALUE="{position.z}"  # Save Z position
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_e VALUE="{E}"  # Save retraction length
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{printer['extruder'].target}"  # Save target temperature
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_efan VALUE={printer["fan_generic cooling_fan"].speed *255}
    SAVE_GCODE_STATE NAME=_KM_PAUSE_OVERRIDE_STATE  # Save the complete G-code state

    {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] and printer.save_variables.variables.enable_box == 1 %}
      BUFFER_MONITORING ENABLE=0 
    {% endif %}
 
    _KM_PAUSE_BASE  
    DISABLE_ALL_SENSOR  # Disable all sensors

    M83 
    {% if printer.extruder.can_extrude %}  # If the extruder can extrude
      G1 E{'%.4f' % -E} F{km.load_speed}  # Retract the specified length to prevent ooze
    {% endif %}
    # === Move to a safe park position ===
      PARK P=2{% for k in params|select("in", "XYZ") %}{
          ' '~k~'="'~params[k]~'"'}{% endfor %}  # Park at the specified position (P=2 means pause park)
    _KM_BEEP_IF_AVAILABLE BEEPS={params.B|default(10)}  # Audible alert (default 10 beeps)
    M104 S0             #Turn off heating (save energy and prevent filament degradation)
    SET_STEPPER_ENABLE STEPPER=extruder enable=0
    SET_IDLE_TIMEOUT TIMEOUT=259200  #72h (259200 seconds = 72 hours extended standby)
  #############
  {% else %}
    { action_respond_info("Print not in progress") }  # Prompt when not printing
  {% endif %}



# Smart recovery macro - fully automatic print recovery
# Function: preheat the extruder, clean the nozzle, restore position, compensate filament, and restore print state
# Parameters: E=explicit compensation length (overrides the saved retraction length)
# Process: temperature check → preheat → clean → restore position → filament compensation → restore state
[gcode_macro RESUME_PRINT]
description: Resumes the currently paused print.
  Usage: RESUME [E<pos>]
#rename_existing: _KM_RESUME_BASE
variable_saved_extruder_temp: 0  # Saved extruder target temperature
variable_saved_x: 0.0  # Saved X position
variable_saved_y: 0.0  # Saved Y position
variable_saved_z: 0.0  # Saved Z position
variable_saved_e: 0.0  # Saved retraction length
variable_saved_efan: 0 #Saved fan state
gcode:
  # === Pause state check and initialization ===
  {% if printer.pause_resume.is_paused %}  # Confirm the printer is currently paused
    {% set km = printer["gcode_macro _km_globals"] %}
    {% set extruder = printer[printer.toolhead.extruder] %}

    {% if saved_extruder_temp > 0 %}
      M106 S0
      M109 S{saved_extruder_temp}  
      G1 X{km.park_x} F9000  
      G1 Y{km.park_y} F9000           
      G92 E0
      M83
      G1  E250 F300  
    

      G1 X{km.park_x + 27} F10000  
      G1 X{km.park_x + 8} F6000  
      G1 X{km.park_x + 27} F10000  
      G1 X{km.park_x + 8} F6000 
      G1 X{km.park_x + 27} F10000  
      G1 X{km.park_x + 8} F6000 
      G1 X{km.park_x} F5000


      SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{0}"  # Clear the saved temperature
      G90  
      M106 S{saved_efan}
      G0 X{km.park_x - 19} F{km.travel_speed_xy}  #Adjusted exit path through the notch
      G0 Y{km.park_y - 30} F{km.travel_speed_xy}  
      G0 X{saved_x} Y{saved_y} F{km.travel_speed_xy}  
      G0 Z{saved_z} F{km.travel_speed_z}  
      G91  
    {% endif %}
#    G1 E{'%.4f' % (params.E|default(saved_e))} F{km.load_speed}  # Compensate for pause retraction

    {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 %} 
      BUFFER_MONITORING ENABLE=1
    {% endif %}
    {% if not (printer["box_extras"] and printer["box_extras"].is_tool_change == 1) %}
      ENABLE_ALL_SENSOR
    {% endif %}

    RESTORE_GCODE_STATE NAME=_KM_PAUSE_OVERRIDE_STATE MOVE=1  
    _KM_RESUME_BASE  
    SET_PRINT_MAIN_STATUS MAIN_STATUS=printing   
  {% else %}
    { action_respond_info("Printer is not paused.") }  
  {% endif %}



[gcode_macro RESUME]
rename_existing: _KM_RESUME_BASE
gcode:
  {% if printer['pause_resume'].is_paused|int == 1 %}
    {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
      {% if printer.save_variables.variables.enable_box == 1 %}
        TRY_RESUME_PRINT
      {% else %}
        {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
          RESUME_PRINT
        {% else %}
          M118 Please load filament
        {% endif %}
      {% endif %}
    {% else %}
        {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
          RESUME_PRINT
        {% else %}
          M118 Please load filament
        {% endif %}
    {% endif %}
    {% endif %}




[gcode_macro CANCEL_PRINT]
description: Cancels the current print.
  Usage: CANCEL_PRINT
rename_existing: _KM_CANCEL_PRINT_BASE
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}
  # === Print state validation ===
  _KM_CHECK_IS_PRINTING  # Confirm a print is in progress
  # === Status management ===
  SET_PRINT_MAIN_STATUS MAIN_STATUS=cancelling  # Set main status to cancelling

  SET_GCODE_VARIABLE MACRO=_print_end_inner VARIABLE=cancelled VALUE="{True}"  # Mark as cancelled
  {% if (printer.gcode_move.position.z) < 200 %}
      G1 Z200 F480                                       
  {% endif %}
#  PARK         Do not park at the wipe position for now; only park Y
  G1 Y380 F5000

  PRINT_END  
  _KM_CANCEL_PRINT_BASE  
  M107          #Turn off the fan
  M106 P2 S0
  M106 P3 S0
  M106 P4 S0
  {% if printer.pause_resume.is_paused %}  
    RESTORE_GCODE_STATE NAME=_KM_PAUSE_OVERRIDE_STATE MOVE=0  
  {% endif %}
  CLEAR_PAUSE  


# Pause-state cleanup macro - manually clear all pause-related data
# Function: clear saved position, temperature, and extrusion parameters, then reset the pause state
# Use: fault recovery, forced cleanup, and system reset
[gcode_macro clear_pause]
description: Clears the current pause state.
  Usage: CLEAR_PAUSE
rename_existing: _KM_CLEAR_PAUSE
gcode:
  # === Clear saved parameters ===
  SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_e VALUE="{0.0}"  # Clear the saved extrusion length
  SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{0}"  # Clear the saved temperature
  SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{0}"  # Clear the saved fan speed
  # === Invoke native cleanup ===
  _KM_CLEAR_PAUSE  # Call Klipper native pause cleanup


# Filament change macro - M600 (Marlin-compatible command)
# Function: automatic filament change flow including pause, unload, user wait, and heated recovery
# Parameters: B=beep count, E=extrusion position, L=load length, R=recovery temperature, U=unload length, X/Y/Z=park position
[gcode_macro m600]
description: Pauses the current print.
  Usage: M600 [B<beeps>] [E<pos>] [L<pos>] [R<temp>] [U<pos>] [X<pos>] [Y<pos>]
              [Z<pos>]
gcode:
  # === Pause the print and move to the filament-change position ===
  PAUSE B="{0}" P=2{% for k in params|select("in", "EXYZ") %}{
      ' '~k~'="'~params[k]~'"'}{% endfor %}  # Pause and pass through position parameters
  # === Automatically unload old filament ===
  UNLOAD_FILAMENT{% if 'U' in params %} LENGTH={params.U}{% endif
               %} BEEPS="{params.B|default(10)|int}"  # Unload filament (optional length and beep count)
  # === Optional temperature preheat ===
  {% if 'R' in params %}M109 S{params.R}{% endif %}  # If parameter R is specified, preheat to that temperature

# Marlin-compatible pause command - M601
# Function: simply pause the print; equivalent to PAUSE
[gcode_macro m601]
description: Pauses the current print.
  Usage: M601
gcode:
  PAUSE  # Call the PAUSE macro directly

# Marlin-compatible resume command - M602 
# Function: resume a paused print; equivalent to RESUME
[gcode_macro m602]
description: Resumes the currently paused print.
  Usage: M602
gcode:
  RESUME  # Call the RESUME macro directly

# Marlin-compatible start command override - M24
# Function: smart start/resume; automatically choose resume or start based on state
[gcode_macro m24]
rename_existing: M24.6245197
gcode:
  {% if printer.pause_resume.is_paused %}  # If currently paused
  RESUME  # Resume the print
  {% else %}  # If not paused
  M24.6245197  # Call the original M24 command (start print)
  {% endif %}

# Marlin-compatible pause command override - M25
# Function: pause the current print; equivalent to PAUSE
[gcode_macro m25]
rename_existing: M25.6245197
gcode:
  PAUSE  # Call the PAUSE macro to pause the print


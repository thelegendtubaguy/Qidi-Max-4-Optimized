[gcode_macro pause]
description: Pauses the current print.
  Usage: PAUSE [X=<pos>] [Y=<pos>] [Z=<pos>] [E=<retract_length>] [B=<beeps>]
rename_existing: _KM_PAUSE_BASE
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}
  # Retract length (negative)
  # Consumable retraction length setting (to prevent leakage)
  {% set E = (params.E|default(5))|float %}

  # === Pause status check ===
  {% if printer.pause_resume.is_paused %}
    { action_respond_info("Print already paused") }  # Prompt if paused
  {% elif printer.idle_timeout.state | string == "Printing" or
          (printer.virtual_sdcard|default({})).is_active|default(False) %}
    # === Status Management ===
    SET_PRINT_MAIN_STATUS MAIN_STATUS=pausing  # Set the main status to pause
    # === Position and parameter saving ===
    {% set position = printer.gcode_move.gcode_position %}  # Get the current G code position
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_x VALUE="{position.x}"  # Save X position
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_y VALUE="{position.y}"  # Save Y position
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_z VALUE="{position.z}"  # Save Z position
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_e VALUE="{E}"  # Save retrieval length
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{printer['extruder'].target}"  # Save target temperature
    SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_efan VALUE={printer["fan_generic cooling_fan"].speed *255}
    SAVE_GCODE_STATE NAME=_KM_PAUSE_OVERRIDE_STATE  # Save complete G code status

    {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] and printer.save_variables.variables.enable_box == 1 %}
      BUFFER_MONITORING ENABLE=0 
    {% endif %}
 
    _KM_PAUSE_BASE  
    DISABLE_ALL_SENSOR  # Disable all sensors

    M83 
    {% if printer.extruder.can_extrude %}  # If the extruder can extrude
      G1 E{'%.4f' % -E} F{km.load_speed}  # Pull back to a specified length to prevent leakage
    {% endif %}
    # === Move to a safe parking location ===
      PARK P=2{% for k in params|select("in", "XYZ") %}{
          ' '~k~'="'~params[k]~'"'}{% endfor %}  # Park to the designated location (P=2 means pause parking)
    _KM_BEEP_IF_AVAILABLE BEEPS={params.B|default(10)}  # Beep reminder (default 10 times)
    M104 S0             #Shut down temperature (save energy and prevent consumables from deteriorating)
    SET_STEPPER_ENABLE STEPPER=extruder enable=0
    SET_IDLE_TIMEOUT TIMEOUT=259200  #72h (259200 seconds = 72 hours long standby)
  #############
  {% else %}
    { action_respond_info("Print not in progress") }  # Prompt when not printing
  {% endif %}



# Smart Recovery System Macro - Fully Automatic Print Recovery Processing
# Function: Preheat extruder, clean nozzle, restore position, compensate consumables, restore printing status
# Parameters: E=specifies the replenishment length (overwrites the saved retraction length)
# Process: Temperature checkPreheatingCleaningPosition recoveryConsumables compensationStatus recovery
[gcode_macro RESUME_PRINT]
description: Resumes the currently paused print.
  Usage: RESUME [E<pos>]
#rename_existing: _KM_RESUME_BASE
variable_saved_extruder_temp: 0  # Saved extruder target temperature
variable_saved_x: 0.0  # Saved X position
variable_saved_y: 0.0  # Saved Y position
variable_saved_z: 0.0  # Saved Z position
variable_saved_e: 0.0  # Saved retraction length
variable_saved_efan: 0 #Saved fan status
gcode:
  # === Pause status check and initialization ===
  {% if printer.pause_resume.is_paused %}  # Confirm that it is currently on hold
    {% set km = printer["gcode_macro _km_globals"] %}
    {% set extruder = printer[printer.toolhead.extruder] %}

    {% if saved_extruder_temp > 0 %}
      M106 S0
      M109 S{saved_extruder_temp}  
      G1 X{km.park_x} F9000  
      G1 Y{km.park_y} F9000           
      G92 E0
      M83
      G1  E250 F300  
    

      G1 X{km.park_x + 27} F10000  
      G1 X{km.park_x + 8} F6000  
      G1 X{km.park_x + 27} F10000  
      G1 X{km.park_x + 8} F6000 
      G1 X{km.park_x + 27} F10000  
      G1 X{km.park_x + 8} F6000 
      G1 X{km.park_x} F5000


      SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{0}"  # Clear saved temperatures
      G90  
      M106 S{saved_efan}
      G0 y{km.park_y - 20} F{km.travel_speed_xy}  
      G0 X{saved_x} Y{saved_y} F{km.travel_speed_xy}  
      G0 Z{saved_z} F{km.travel_speed_z}  
      G91  
    {% endif %}
#    G1 E{'%.4f' % (params.E|default(saved_e))} F{km.load_speed} # Compensate for retraction during pause

    {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 %} 
      BUFFER_MONITORING ENABLE=1
    {% endif %}
    {% if not (printer["box_extras"] and printer["box_extras"].is_tool_change == 1) %}
      ENABLE_ALL_SENSOR
    {% endif %}

    RESTORE_GCODE_STATE NAME=_KM_PAUSE_OVERRIDE_STATE MOVE=1  
    _KM_RESUME_BASE  
    SET_PRINT_MAIN_STATUS MAIN_STATUS=printing   
  {% else %}
    { action_respond_info("Printer is not paused.") }  
  {% endif %}



[gcode_macro RESUME]
rename_existing: _KM_RESUME_BASE
gcode:
  {% if printer['pause_resume'].is_paused|int == 1 %}
    {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
      {% if printer.save_variables.variables.enable_box == 1 %}
        TRY_RESUME_PRINT
      {% else %}
        {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
          RESUME_PRINT
        {% else %}
          M118 Please load filament
        {% endif %}
      {% endif %}
    {% else %}
        {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
          RESUME_PRINT
        {% else %}
          M118 Please load filament
        {% endif %}
    {% endif %}
    {% endif %}




[gcode_macro CANCEL_PRINT]
description: Cancels the current print.
  Usage: CANCEL_PRINT
rename_existing: _KM_CANCEL_PRINT_BASE
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}
  # === Print status verification ===
  _KM_CHECK_IS_PRINTING  # Confirm that printing is currently taking place
  # === Status Management ===
  SET_PRINT_MAIN_STATUS MAIN_STATUS=cancelling  # Set the main status to Canceling

  SET_GCODE_VARIABLE MACRO=_print_end_inner VARIABLE=cancelled VALUE="{True}"  # Mark as canceled
  {% if (printer.gcode_move.position.z) < 200 %}
      G1 Z200 F480                                       
  {% endif %}
#  PARK does not park to the wiping position temporarily, only park Y
  G1 Y380 F5000

  PRINT_END  
  _KM_CANCEL_PRINT_BASE  

  {% if printer.pause_resume.is_paused %}  
    RESTORE_GCODE_STATE NAME=_KM_PAUSE_OVERRIDE_STATE MOVE=0  
  {% endif %}
  CLEAR_PAUSE  


# Pause Status Cleaner Tool Macro - Manually clear all pause related data
# Function: Clear saved position, temperature, extrusion parameters, reset pause state
# Purpose: Fault recovery, forced cleanup, system reset
[gcode_macro clear_pause]
description: Clears the current pause state.
  Usage: CLEAR_PAUSE
rename_existing: _KM_CLEAR_PAUSE
gcode:
  # === Clear saved parameters ===
  SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_e VALUE="{0.0}"  # Clear saved extrusion length
  SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{0}"  # Clear saved temperatures
  SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=saved_extruder_temp VALUE="{0}"  # case fan speed
  # === Call native cleanup ===
  _KM_CLEAR_PAUSE  # Call Klipper natively to pause cleaning


# Material change macro - M600 (Marlin compatible command)
# Function: Automatic material changing process, including pausing, unloading consumables, waiting for user operation, and heating recovery
# Parameters: B=number of beeps, E=extrusion position, L=loading length, R=recovery temperature, U=unloading length, X/Y/Z=parking position
[gcode_macro m600]
description: Pauses the current print.
  Usage: M600 [B<beeps>] [E<pos>] [L<pos>] [R<temp>] [U<pos>] [X<pos>] [Y<pos>]
              [Z<pos>]
gcode:
  # === Pause printing and move to reloading position ===
  PAUSE B="{0}" P=2{% for k in params|select("in", "EXYZ") %}{
      ' '~k~'="'~params[k]~'"'}{% endfor %}  # Pause and pass positional arguments
  # === Automatically uninstall old consumables ===
  UNLOAD_FILAMENT{% if 'U' in params %} LENGTH={params.U}{% endif
               %} BEEPS="{params.B|default(10)|int}"  # Unload consumables (length and number of beeps can be specified)
  # === Optional temperature preheating ===
  {% if 'R' in params %}M109 S{params.R}{% endif %}  # If the R parameter is specified, preheat to the specified temperature

# Marlin Compatible Suspend Command - M601
# Function: Simply pause printing, equivalent to the PAUSE command
[gcode_macro m601]
description: Pauses the current print.
  Usage: M601
gcode:
  PAUSE  # Call the PAUSE macro directly

# Marlin Compatible Recovery Command - M602
# Function: Resume paused printing, equivalent to the RESUME command
[gcode_macro m602]
description: Resumes the currently paused print.
  Usage: M602
gcode:
  RESUME  # Call the RESUME macro directly

# Marlin Compatible Start Command Rewrite - M24
# Function: Smart start/resume, automatically select resume or start based on status
[gcode_macro m24]
rename_existing: M24.6245197
gcode:
  {% if printer.pause_resume.is_paused %}  # If currently on hold
  RESUME  # Resume printing
  {% else %}  # if not paused
  M24.6245197  # Call the original M24 command (start printing)
  {% endif %}

# Marlin compatible pause command rewrite - M25
# Function: Pause the current printing, equivalent to the PAUSE command
[gcode_macro m25]
rename_existing: M25.6245197
gcode:
  PAUSE  # Call PAUSE macro to pause printing


# Main print start macro - entry point for slicer calls

[gcode_macro print_start]
description: Usage: PRINT_START BED=<temp> HOTENDTEMP=<temp> [PURGETEMP=<temp>] [CHAMBER=<temp>] EXTRUDER = <num>
                     [MESH_MIN=<x,y>] [MESH_MAX=<x,y>] [LAYERS=<num>]
                     [NOZZLE_SIZE=<mm>]
gcode:
  # Set the printing master status to the starting stage
  SET_PRINT_MAIN_STATUS MAIN_STATUS=print_start
  # ===Print the four core stages of startup ===
  _PRINT_START_PHASE_INIT {rawparams}   # Phase 1: Initialize setup and start bed/chamber preheating
  _PRINT_START_BOX_PREPAR               # Stage 2: Multi-color consumable preparation and switching
  _PRINT_START_PHASE_PREHEAT            # Phase 3: Temperature stabilization and shaft return
  _PRINT_START_PHASE_PROBING            # Stage 4: Detection calibration (bed net/gantry leveling)
  _PRINT_START_PHASE_EXTRUDER           # Stage 5: Final warm-up of the extruder
  # Switch to official printing status
  SET_PRINT_MAIN_STATUS MAIN_STATUS=printing

[gcode_macro _print_start_phase_init]
description: Inserted by slicer at start of print. Initializes PRINT_START
  phases.
  Usage: See PRINT_START.
gcode:

  # === Basic system initialization ===
  CHECK_KM_CONFIG                                                     # Check macro library configuration parameters
  M1001                                                                # Automatically adjust vibration compensation parameters
  DISABLE_ALL_SENSOR                                                  # Disable all sensors
  SET_GCODE_VARIABLE MACRO=_print_end_inner VARIABLE=cancelled VALUE="{False}" # Reset print cancel flag
  _KM_APPLY_PRINT_OFFSET RESET=1                                      # Reset printing offset
  _PRINT_START_PHASE_CHECK PHASE=none                                 # Verify phase status correctness
  {% set km = printer["gcode_macro _km_globals"] %}

  # === Parameter compatibility processing ===
  {% if not params.BED %}
    {% set dummy = params.__setitem__('BED', params.BED_TEMP|int) %}  # Compatible with BED_TEMP parameter
  {% endif %}
  {% if not params.HOTENDTEMP %}
    {% if params.HOTEND %}
      {% set dummy = params.__setitem__('HOTENDTEMP', params.HOTEND|int) %} # Compatible with legacy HOTEND parameter
    {% else %}
      {% set dummy = params.__setitem__('HOTENDTEMP', params.HOTEND_TEMP|int) %} # Compatible with HOTEND_TEMP parameter
    {% endif %}
  {% endif %}
  {% if not params.PURGETEMP %}
    {% set dummy = params.__setitem__('PURGETEMP', params.HOTENDTEMP|int) %}
  {% endif %}

  # === Parameter persistent storage ===
  # Save all printing parameters for subsequent stages (including temperature, size, etc.)
  PRINT_START_SET PRINT_START_PHASE="init" {% for k in params %}{' %s=\"%s\"' %
    (k,params[k]|replace('\\','\\\\')|replace('\'','\\\'')|replace('\"','\\\"'))
  }{% endfor %}

  # === Print bounds checking and basic initialization ===
  #_km_check_and_set_print_bounds # Verify and set print boundary parameters - mask first
  M107                                                                # Turn off the part cooling fan
  CLEAR_PAUSE                                                         # Clear any pause status
  # === Start long warm-up process ===
  M140 S{params.BED}                                                  # Start bed heating (most time consuming)
  {% if params.CHAMBER %}M141 S{params.CHAMBER|int}{% endif %}        # Start chamber heating (if applicable)
  # === Bed network calibration preparation ===
  {% if printer.bed_mesh %}BED_MESH_CLEAR{% endif %}                  # Clear old bed network data
  # Try loading a saved surface mesh (if configured)
  # {% if km.start_try_saved_surface_mesh and printer.bed_mesh %}
  #   LOAD_SURFACE_MESH #Load the saved bed mesh
  # {% endif %}
  G28
  # Moving on to the next stage: Preparing consumables
  PRINT_START_SET PRINT_START_PHASE="box_prepar"

# =============================================================================
# Stage 3: Multi-color consumable preparation stage (AMS automatic material changing system)
# =============================================================================
# Core functions: Multi-color printing supplies management and automatic switching system
# - Detect current consumable slot and target slot
# - Automatically unload old consumables and clean nozzles
# - Perform consumable switching and cleaning processes
# - Ensure that the consumables are in correct condition before printing

[gcode_macro _print_start_box_prepar]
description: Preparation of box filament
gcode:
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set BED = print.BED|int %}
  {% set HOTENDTEMP = print.HOTENDTEMP|int %}
  {% set PURGETEMP = print.PURGETEMP|default(HOTENDTEMP)|int %}
  {% set EXTRUDER = print.EXTRUDER|default(0)|int %}
  {% set km = printer["gcode_macro _km_globals"] %}

  _PRINT_START_PHASE_CHECK PHASE=box_prepar                          # Verification phase status
  # === Multi-color consumable system check ===
  BUFFER_MONITORING ENABLE=0
  {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %}
        SAVE_VARIABLE VARIABLE=load_retry_num VALUE=0
        SAVE_VARIABLE VARIABLE=retry_step VALUE=None
        CLEAR_TOOLCHANGE_STATE
        {% for i in range(16) %}
            SAVE_VARIABLE VARIABLE=runout_{i} VALUE=0
            G4 P10
        {% endfor %}
        {% if printer.save_variables.variables.enable_box == 1 %}
            BOX_PRINT_START EXTRUDER={EXTRUDER} HOTENDTEMP={HOTENDTEMP}
            M400
            {% if km.start_box_flush_after_load %}
                EXTRUSION_AND_FLUSH HOTENDTEMP={HOTENDTEMP}
            {% endif %}
        {% endif %}
  {% endif %}  # === Multi-color system check ended ===
  # Entering the next stage: warm-up stage
  PRINT_START_SET PRINT_START_PHASE="preheat"

# =============================================================================
# Phase 3: Warm-up phase - bed and chamber temperature stabilization + shaft return
# =============================================================================
# Core functions: Efficient preheating management and temperature stabilization
# - Bed temperature overshoot optimization: overheat first and then stabilize to the target temperature
# - Temperature detection: intelligently determine whether the target temperature has been reached
# - Axis homing and nozzle cleaning: performed in parallel during the heating process
# - Conditional detection preheating: Determine the extruder preheating strategy based on subsequent operations

[gcode_macro _print_start_phase_preheat]
description: Inserted by slicer at start of print. Handles the bed and chamber
  heating phases and ends when both are stabilized at their target temperatures.
  Usage: See PRINT_START.
gcode:
  _PRINT_START_PHASE_CHECK PHASE=preheat                            # Verification phase status
  # === Get printing parameters ===
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set BED = print.BED|int %}                                     # bed temperature
  {% set HOTENDTEMP = print.HOTENDTEMP|int %}                       # Final nozzle temperature
  {% set PURGETEMP = print.PURGETEMP|default(HOTENDTEMP)|int %}     # Rear purge temperature
  {% set CHAMBER = print.CHAMBER|default(0)|int %}                  # Cavity temperature
  {% set LAYERS = print.LAYERS|default(0)|int %}                    # Number of layers
  {% set km = printer["gcode_macro _km_globals"] %}                 # global parameters
  # === Intelligent judgment of bed temperature status ===
  # Determine whether the bed temperature has reached the target (error range: -0.2~+1.0C)
  {% set bed_at_target = (BED + 0.4 - printer.heater_bed.temperature) |
                           abs <= 0.6 %}                           # Is the bed temperature stable?
  PRINT_START_SET BED_AT_TARGET={1 if bed_at_target else 0}          # Save bed temperature status
  # === Temperature related operation judgment ===
  {% set start_level_bed_at_temp = km.start_level_bed_at_temp and
                                   not printer.bed_mesh.profile_name %} # Needs leveling at temp
  {% set actions_at_temp = start_level_bed_at_temp or
                           km.start_quad_gantry_level_at_temp or
                           km.start_z_tilt_adjust_at_temp or
                           (km.start_home_z_at_temp and not bed_at_target) %} # Is temperature operation required?
  # === Bed temperature overshoot calculation ===
  {% set bed_overshoot = (BED + (km.start_bed_heat_overshoot if
             (BED and not bed_at_target) else 0.0),
           printer.configfile.settings.heater_bed.max_temp ) | min %} # Overshoot temperature (not exceeding the maximum value)

  # ===Initialization and heating start ===
  INIT_LAYER_GCODE LAYERS="{LAYERS}"                                # Initialization layer code system
  {% if CHAMBER > 0.0 %}
    M141 S{CHAMBER}                                                # Set chamber temperature
  {% endif %}
  M140 S{bed_overshoot}                                          # Activate bed heating (overshoot mode)
  # === Axis homing and nozzle cleaning === # All axis homing
  CLEAR_NOZZLE HOTEND={PURGETEMP}                                 # Preheat and clean nozzles

  # === Extruder preheating strategy ===
  {% if actions_at_temp %}                                       # Need to perform operations at temperature
    # Detection mode: Use detection temperature or partial preheating to avoid leaks
    M104 S{km.start_extruder_probing_temp if km.start_extruder_probing_temp > 0
      else (km.start_extruder_preheat_scale * HOTENDTEMP)|round(0,'ceil')|int}  # Set detection temperature
  {% else %}
    # Normal mode: directly set the target temperature or detection temperature
    M104 S{km.start_extruder_probing_temp if km.start_extruder_probing_temp > 0
      else HOTENDTEMP}                                          # Set extruder temperature
  {% endif %}

  # === Accurate bed temperature control process ===
  {% if BED > 0.0 %}                                             # If bed heating is required
    {% if not bed_at_target %}                                   # If the bed temperature has not reached the target
      PARK                                                       # Park the printhead
      # === Overshoot-Stabilize Bed Temperature Strategy ===
      M190 S{bed_overshoot}                                      # Wait for overshoot temperature
      G4 P{km.start_bed_heat_delay / 2}                          # Waiting for stability (first half)
      M190 R{BED}                                                # Stable to target temperature
      G4 P{km.start_bed_heat_delay / 2}                          # Waiting for stability (second half)
    {% endif %}
  {% endif %}

  # # === Cavity temperature control ===
  # {% if CHAMBER > 0.0 %} # If cavity heating is required
  #   _KM_PARK_IF_NEEDED HEATER="chamber" RANGE=ABOVE # Park on demand (when the temperature is lower than the target)
  #   M191 S{CHAMBER} # Wait for the cavity to reach the target temperature
  # {% endif %}

  # === Bed temperature stability check ===
  {% if BED > 0.0 and bed_at_target%}                            # If you skipped bed heating before
    M190 R{BED}                                                  # Additional bed temperature stability checks
  {% endif %}

  # Entering the next stage: detection stage
  PRINT_START_SET PRINT_START_PHASE="probing"

# =============================================================================
# Phase 4: Detection Calibration Phase - Bed Network Calibration
# =============================================================================

[gcode_macro _print_start_phase_probing]
gcode:
  _PRINT_START_PHASE_CHECK PHASE=probing                          # Verification phase status
  # === Get detection parameters ===
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set km = printer["gcode_macro _km_globals"] %}

  {% set HOTENDTEMP = print.HOTENDTEMP|int %}
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set start_level_bed_at_temp = km.start_level_bed_at_temp and
                                   not printer.bed_mesh.profile_name %}
  {% set start_home_z_at_temp = km.start_home_z_at_temp and
                                not print.BED_AT_TARGET|int %}
  {% set actions_at_temp = start_level_bed_at_temp or
                           km.start_quad_gantry_level_at_temp or
                           km.start_z_tilt_adjust_at_temp or
                           start_home_z_at_temp %}
  {% if actions_at_temp %}
    {% if km.start_extruder_probing_temp > 0 %}
    _KM_PARK_IF_NEEDED HEATER={printer.toolhead.extruder} RANGE=2
    M109 R{km.start_extruder_probing_temp}
    {% else %}
      M104 S{HOTENDTEMP} # set the final extruder target temperature
    {% endif %}
    CUT_FILAMENT_1      #Cut off consumables

    {% if km.start_z_tilt_adjust_at_temp %}
      Z_TILT_ADJUST
    {% endif %}
    G29_ZSAFE #Leveling compatible with G29 while avoiding redundant XY rehome

    _km_apply_print_offset SET=1   #Load saved zoffset

  {% endif %}
  PRINT_START_SET PRINT_START_PHASE="extruder"

# =============================================================================
# Stage 5: Final warm-up stage of the extruder
# =============================================================================
# Core function: The extruder temperature finally stabilizes and enters the printing state

[gcode_macro _print_start_phase_extruder]
description: Inserted by slicer at start of print. Preheats the extruder.
  Usage: See PRINT_START.
gcode:
  _PRINT_START_PHASE_CHECK PHASE=extruder                         # Verification phase status
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set HOTENDTEMP = print.HOTENDTEMP|default(print.HOTEND_TEMP)|float %} # Get extruder target temperature
  {% set CHAMBER = print.CHAMBER|default(0)|int %}                  # Cavity temperature
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set Polar_cooler = printer.save_variables.variables.enable_polar_cooler|default(0) %}

  {% if CHAMBER == 0 %}
    M106 P3 S255
  {% endif %}

  M106 P4 S{Polar_cooler}                    #Turn on the air conditioner according to settings
  M106 S{HOTENDTEMP}
  #_KM_PARK_IF_NEEDED HEATER={printer.toolhead.extruder} RANGE=ABOVE # Park below temperature
  G1 X380 Y5  F30000
  M109 S{HOTENDTEMP}                                           # Wait for the extruder to reach target temperature
  ENABLE_ALL_SENSOR                                             #Turn on all sensors
  PRINT_START_SET PRINT_START_PHASE="printing"                    # Set stage to print

# =============================================================================

# Usage: _KM_PARK_IF_NEEDED HEATER=<heater> RANGE=[<percent>|ABOVE|BELOW]

[gcode_macro _km_park_if_needed]
description: Parks the extruder if the current temperature of the supplied
  heater is not within the specified target range.
  Usage: _KM_PARK_IF_NEEDED HEATER=<heater> RANGE=[<percentage>|ABOVE|BELOW]
gcode:
  # === Heater and Range Parameter Analysis ===
  # NOTE: Must be called as a separate macro to get real time temperature
  {% set HEATER = params.HEATER if params.HEATER in
                    printer.heaters.available_heaters else
                  ("heater_generic " ~ params.HEATER) %}           # Automatic recognition of heater type
  {% set RANGE = (params.RANGE|default(1))|string|upper %}         # Range parameter (default 1%)

  # === Temperature condition judgment and parking decision ===
  {% if printer[HEATER].target %}                                 # If the heater has a target temperature
    {% if RANGE == "ABOVE" %}                                     # ABOVE mode: Park when the temperature is lower than the target
      {% if printer[HEATER].temperature < printer[HEATER].target %}
        PARK                                                     # Execute parking
      {% endif %}
    {% elif RANGE == "BELOW" %}                                  # BELOW mode: Park when the temperature is higher than the target
      {% if printer[HEATER].temperature > printer[HEATER].target %}
        PARK                                                     # Execute parking
      {% endif %}
    {% elif (printer[HEATER].temperature - printer[HEATER].target)|abs >
             (printer[HEATER].target * RANGE|float * 0.01)|abs %}  # Percent mode: Stop when the error exceeds the percentage
      PARK                                                       # Execute parking
    {% endif %}
  {% endif %}

#Print Z_OFFSET management macro

[gcode_macro _km_apply_print_offset]
variable_offset: []                                              # Variable that stores the current offset value
gcode:
  {% if params.RESET|default(0)|int %}
    # SAVE_VARIABLE VARIABLE=z_offset VALUE=0
    SET_GCODE_OFFSET Z=0 MOVE=0
  {% elif params.SET|default(0)|int %}
    {% set z = printer.save_variables.variables.z_offset|default(0) %}
    SET_GCODE_OFFSET Z={z} MOVE=0
  {% elif params.SAVE|default(0)|int %}
    {% if printer.gcode_move.homing_origin.z < 0.5 %}
       SAVE_VARIABLE VARIABLE=z_offset VALUE={printer.gcode_move.homing_origin.z}
    {% endif %}
  {% endif %}

# =============================================================================
# Print Parameter Storage Macro - used to pass and store parameters between stages
# =============================================================================
# Core functionality: Provides persistent parameter storage for all PRINT_START stages
# Usage: PRINT_START_SET <variable>=<value>

[gcode_macro print_start_set]
description: Inserted by slicer to set values used by PRINT_START.
  Usage: PRINT_START_SET <VARIABLE>=<value>
variable_print: {}                                               # Dictionary to store all printing parameters
gcode:
  # === Dynamically set parameters ===
  {%for k in params %}                                           # Iterate through all incoming parameters
    {% set dummy = print.__setitem__(k|upper, params[k]) %}      # Convert parameter names to uppercase and store
  {% endfor %}

# =============================================================================
# Phase Status Check Macro - Verifies the correctness and sequence of print startup phases
# =============================================================================
# Core function: Ensure that printing stages are executed in the expected order, preventing stage errors and out-of-order

[gcode_macro _print_start_phase_check]
gcode:
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set PRINT_START_PHASE = print.PRINT_START_PHASE|default("none") %}
  {% if PRINT_START_PHASE != params.PHASE %}
    # Reset the phases manually just to be sure.
    SET_GCODE_VARIABLE MACRO=print_start_set VARIABLE=print VALUE="{{}}"
    {% if params.PHASE != 'none' %}
      {% set error = "PRINT_START phase error. Expected '%s' but found '%s'" %
                       (params.PHASE, PRINT_START_PHASE) %}
      # Do the cancel manually if we're not confident it will fire.
      {% if not 'virtual_sdcard' in printer or
            not printer.virtual_sdcard.is_active or 'CANCEL_PRINT' not in
              printer.configfile.settings.virtual_sdcard.on_error_gcode|
                default("")|upper %}
        {action_respond_info(error)}
        CANCEL_PRINT
      {% else %}
        {action_raise_error(error)}
      {% endif %}
    {% else %}
      { action_respond_info("Expected phase '%s' but found '%s'. Resetting."
                             % (params.PHASE, PRINT_START_PHASE)) }
    {% endif %}
  {% endif %}

# =============================================================================
# Print ends the main process - the entry point for slicer calls
# =============================================================================
# Core Function: Safely shut down all systems and restore to initial state
# - Clean the print head and bed surface
# - Turn off all heaters and fans
# - Disable stepper motors and sensors
# - Clear all printing status and settings

[gcode_macro print_end]
description: Inserted by slicer at end of print.
  Usage: PRINT_END
gcode:
  _KM_CHECK_IS_PRINTING                                          # Verify printing status
  M400                                                           # Wait for all actions to complete
  _PRINT_END_INNER                                               # Execute internal closing process

  {% set km = printer["gcode_macro _km_globals"] %}

  # === Reset all adjustment parameters ===
  {% if km.start_clear_adjustments_at_end != 0 %}               # If clear adjustments are configured

    RESET_FAN_SCALING                                            # Reset fan scaling
    M220 S100                                                    # Reset speed multiplier to 100%
    M221 S100                                                    # Reset flow rate to 100%
  {% endif %}
  # === System reset and shutdown ===
  _RESET_LAYER_GCODE                                             # Reset layer code system
  _RESET_VELOCITY_LIMITS                                         # Reset speed limit
  TURN_OFF_HEATERS                                               # Turn off all heaters
  M107                                                           # Turn off main fan
  M106 P2 S0                                                     # Turn off auxiliary fan 2
  #M106 P3 S0 # Turn off auxiliary fan 3
  M106 P4 S0                                                     # Turn off the air conditioner

  {% if printer.bed_mesh %}BED_MESH_CLEAR{% endif %}             # Clear bed network data
  G31

  # === Stepper Motor and Sensor Control ===
  # M84 ; disable all stepper motors (replaced by fine control)
  M84
  DISABLE_ALL_SENSOR                                             # Disable all sensors

  {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 and printer["box_extras"]%}
    BUFFER_MONITORING ENABLE=0
  {% endif %}     ####buffer
  # === Clear printing status and settings ===
  CLEAR_PAUSE                                                    # clear pause status
  _KM_BEEP_IF_AVAILABLE BEEPS=10                                 #End printing sound prompt
  SET_GCODE_VARIABLE MACRO=print_start_set VARIABLE=print VALUE="{{}}" # Clear printing parameters
  SET_PRINT_MAIN_STATUS MAIN_STATUS=ready                       # Set the main state to ready
  # # === File system cleanup ===
  # SDCARD_RESET_FILE #Reset SD card file status
  # CLEAR_LAST_FILE # Clear the last printed file record

# =============================================================================
# Internal print end process - handling cleanup and parking actions
# =============================================================================

[gcode_macro _print_end_inner]
variable_cancelled: False                                        # cancel flag variable
gcode:
  SET_GCODE_VARIABLE MACRO=_print_end_inner VARIABLE=cancelled VALUE="{False}" # reset cancel flag
  # === Get system parameters ===
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set toolhead = printer.toolhead %}
  {% set origin = printer.gcode_move.homing_origin%}             # Return to origin
  # === Calculate the maximum movement range ===
  {% set max_x = km.print_max[0] - origin.x %}                   # X-axis maximum position
  {% set max_y = km.print_max[1] - origin.y %}                   # Y-axis maximum position
  {% set max_z = toolhead.axis_maximum.z - origin.z %}           # Z-axis maximum position

  # === Status Updates ===
  {% if not cancelled %}                                         # If not cancel printing
    SET_PRINT_MAIN_STATUS MAIN_STATUS=print_completing          # Set main state
  {% endif %}
  _KM_APPLY_PRINT_OFFSET SAVE=1                         #Save first
  _KM_APPLY_PRINT_OFFSET RESET=1                         # Remove print position offset

# =============================================================================
# Print Status Check Macro - Verify that printing is currently taking place
# =============================================================================

[gcode_macro _km_check_is_printing]
variable_debug_state: False                                      # Debug mode (status checking disabled)
description: Throws an error if print is not currently in progress.
gcode:
  # === Multiple print status checks ===
  {% if not debug_state and
        printer.idle_timeout.state|string != "Printing" and         # Idle timeout status is not printing
        not (printer.virtual_sdcard|default({})).is_active|default(False) and # Virtual SD card is not activated
        not printer.pause_resume.is_paused %}                       # Pause resume not activated
    { action_raise_error("No active print.") }                     # Throws error: No active printing
  {% endif %}

# =============================================================================
# Print Boundary Checking and Settings Macro - validates all print boundaries and caches values
# =============================================================================
# Core functions: Verify that MESH and MODEL boundaries are within safe limits, set printing restrictions

[gcode_macro _km_check_and_set_print_bounds]
description: Validates all print bounds and caches their values.
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set print = printer["gcode_macro print_start_set"].print %}

  # === Check grid boundaries ===
  {% if print.MESH_MIN %}                                          # If grid range is specified
    {% set MESH_MIN = print.MESH_MIN.split(",")|map('float')|list %}  # Resolve minimum grid range
    {% set MESH_MAX = print.MESH_MAX.split(",")|map('float')|list %}  # Resolve maximum grid range
    # === Grid-wide security verification ===
    {%if MESH_MIN[0] < km.print_min[0] or MESH_MIN[1] < km.print_min[1] %}
      {action_raise_error("MESH_MIN %s is outside the printable bounds %s" %
                            (MESH_MIN|string, km.print_min|string))}    # Grid minimum is out of bounds
    {%elif MESH_MAX[0] > km.print_max[0] or MESH_MAX[1] > km.print_max[1] %}
      {action_raise_error("MESH_MAX %s is outside the printable bounds %s" %
                            (MESH_MAX|string, km.print_max|string))}    # Grid maximum exceeds bounds
    {% endif %}
  {% endif %}

  # === Find all model boundaries (including the ones passed in) ===
  {% set points = [] %}                                            # Initialization point set
  {% if print.MODEL_MIN or print.MODEL_MAX %}                      # If model boundaries are specified
    {% set MODEL_MIN = print.MODEL_MIN.split(",")|map('float')|list %} # Analytical model minimum range
    {% set MODEL_MAX = print.MODEL_MAX.split(",")|map('float')|list %} # Analytical model maximum range
    {% set points = [MODEL_MIN, MODEL_MAX] %}                     # Set initial point set
  {% endif %}
  # === Get bounds from excluded object system ===
  {% if (printer.exclude_object|default({})).objects %}           # If exclusions are enabled
    {% set points = printer.exclude_object.objects|selectattr('polygon')|
                      map(attribute='polygon')|sum(start=points) %} # Collect polygon points of all objects
    {% set points_len = points|length %}                          # Get the number of points
    {% if points_len >= 2 %}                                      # if there are enough points
      {% set x_coords = (points|map(attribute=0)|sort|list)[0::points_len-1] %} # Get the minimum and maximum value of the X coordinate
      {% set y_coords = (points|map(attribute=1)|sort|list)[0::points_len-1] %} # Get the minimum and maximum value of Y coordinate
      {% set MODEL_MIN = (x_coords[0],y_coords[0])|map('float')|list %} # Calculate the minimum boundary of the model
      {% set MODEL_MAX = (x_coords[1],y_coords[1])|map('float')|list %} # Calculate the maximum boundary of the model
      PRINT_START_SET MODEL_MIN="{MODEL_MIN|join(',')
                   }" MODEL_MAX="{MODEL_MAX|join(',')}"      # Save the computed model boundaries
    {% endif %}
  {% endif %}

  # === Model Boundary Security Verification ===
  {% if MODEL_MIN %}                                               # If there is model boundary data
    {% if MODEL_MIN[0] < km.print_min[0] or MODEL_MIN[1] < km.print_min[1] %}
      {action_raise_error("MODEL_MIN %s is outside the printable bounds %s" %
                            (MODEL_MIN|string, km.print_min|string))} # Model minimum value is out of bounds
    {% elif MODEL_MAX[0] > km.print_max[0] or MODEL_MAX[1] > km.print_max[1] %}
      {action_raise_error("MODEL_MAX %s is outside the printable bounds %s" %
                            (MODEL_MAX|string, km.print_max|string))} # The model maximum value exceeds the boundary
    {% endif %}
  {% endif %}

  # === Set final print limit ===
  {% if MESH_MIN and MODEL_MIN %}                                 # If you have both mesh and model boundaries
    # Take the union of the two: take the smaller minimum value and take the larger maximum value
    PRINT_START_SET PRINT_MIN="{((MODEL_MIN[0],MESH_MIN[0])|min,
                                 (MODEL_MIN[1],MESH_MIN[1])|min)|join(',')
                  }" PRINT_MAX="{((MODEL_MAX[0],MESH_MAX[0])|max,
                                  (MODEL_MAX[1],MESH_MAX[1])|max)|join(',')}"
  {% else %}                                                     # Otherwise use the default print range
    PRINT_START_SET PRINT_MIN="{km.print_min|join(',')
                 }" PRINT_MAX="{km.print_max|join(',')}"        # Use the global configured print range
  {% endif %}

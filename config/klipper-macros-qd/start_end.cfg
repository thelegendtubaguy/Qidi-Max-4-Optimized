


# Main print-start macro - entry point called by the slicer
[gcode_macro print_start]
description: Usage: PRINT_START BED=<temp> HOTEND=<temp> [CHAMBER=<temp>] EXTRUDER = <num>
                     [MESH_MIN=<x,y>] [MESH_MAX=<x,y>] [LAYERS=<num>]
                     [NOZZLE_SIZE=<mm>]
gcode:
  # Set the main print status to the starting phase
  SET_PRINT_MAIN_STATUS MAIN_STATUS=print_start
  # === Four core print-start phases ===
  _PRINT_START_PHASE_INIT {rawparams}   # Stage 1: initialize settings and start bed/chamber preheating
  _PRINT_START_BOX_PREPAR               # Stage 2: multi-color filament preparation and switching  
  _PRINT_START_PHASE_PREHEAT            # Stage 3: temperature stabilization and axis homing
  _PRINT_START_PHASE_PROBING            # Stage 4: probing calibration (bed mesh / gantry leveling)
  _PRINT_START_PHASE_EXTRUDER           # Stage 5: final extruder preheat
  # Switch to the active printing state
  SET_PRINT_MAIN_STATUS MAIN_STATUS=printing


[gcode_macro _print_start_phase_init]
description: Inserted by slicer at start of print. Initializes PRINT_START
  phases.
  Usage: See PRINT_START.
gcode:

  # === Basic system initialization ===
  CHECK_KM_CONFIG                                                     # Check macro-library configuration parameters
  M1001                                                                # Automatically tune vibration compensation parameters
  DISABLE_ALL_SENSOR                                                  # Disable all sensors
  SET_GCODE_VARIABLE MACRO=_print_end_inner VARIABLE=cancelled VALUE="{False}" # Reset the print-cancel flag
  _KM_APPLY_PRINT_OFFSET RESET=1                                      # Reset print offset
  _PRINT_START_PHASE_CHECK PHASE=none                                 # Verify that phase state is correct
  {% set km = printer["gcode_macro _km_globals"] %}

  # === Parameter compatibility handling ===
  {% if not params.BED %}
    {% set dummy = params.__setitem__('BED', params.BED_TEMP|int) %}  # Support the BED_TEMP parameter
  {% endif %}
  {% if not params.HOTEND %}
    {% set dummy = params.__setitem__('HOTEND', params.HOTEND_TEMP|int) %} # Support the HOTEND_TEMP parameter
  {% endif %}

  # === Persist print parameters ===
  # Save all print parameters for later phases (including temperatures, dimensions, etc.)
  PRINT_START_SET PRINT_START_PHASE="init" {% for k in params %}{' %s=\"%s\"' %
    (k,params[k]|replace('\\','\\\\')|replace('\'','\\\'')|replace('\"','\\\"'))
  }{% endfor %}

  # === Print-boundary checks and basic initialization ===
  #_km_check_and_set_print_bounds                                     # Verify and set print-boundary parameters - currently disabled
  M107                                                                # Turn off the part-cooling fan
  CLEAR_PAUSE                                                         # Clear any pause state
  # === Start the long preheat process ===
  M140 S{params.BED}                                                  # Start bed heating (the longest step)
  {% if params.CHAMBER %}M141 S{params.CHAMBER|int}{% endif %}        # Start chamber heating (if present)
  # === Bed-mesh calibration preparation ===
  {% if printer.bed_mesh %}BED_MESH_CLEAR{% endif %}                  # Clear old bed-mesh data
  # Try loading the saved surface mesh (if configured)
  # {% if km.start_try_saved_surface_mesh and printer.bed_mesh %}       
  #   LOAD_SURFACE_MESH                                                # Load the saved bed-surface mesh
  # {% endif %}
  G28
  # Move to the next phase: filament preparation
  PRINT_START_SET PRINT_START_PHASE="box_prepar"

# =============================================================================
# Stage 3: multi-color filament preparation phase (AMS automatic filament-changing system)
# =============================================================================
# Core function: multi-color filament management and automatic switching
# - Detect the current filament slot and target slot
# - Automatically unload old filament and clean the nozzle
# - Perform the filament switch and cleaning flow
# - Ensure filament state is correct before printing
[gcode_macro _print_start_box_prepar]
description: Preparation of box filament
gcode:
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set BED = print.BED|int %}
  {% set HOTEND = print.HOTEND|int %}
  {% set EXTRUDER = print.EXTRUDER|default(0)|int %}       

  _PRINT_START_PHASE_CHECK PHASE=box_prepar                          # Verify phase state
  # === Multi-color filament system checks ===
  BUFFER_MONITORING ENABLE=0
  {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
        SAVE_VARIABLE VARIABLE=load_retry_num VALUE=0
        SAVE_VARIABLE VARIABLE=retry_step VALUE=None
        CLEAR_TOOLCHANGE_STATE
        {% for i in range(16) %}
            SAVE_VARIABLE VARIABLE=runout_{i} VALUE=0
            G4 P100
        {% endfor %}
        {% if printer.save_variables.variables.enable_box == 1 %}
            BOX_PRINT_START EXTRUDER={EXTRUDER} HOTENDTEMP={HOTEND}
            M400
            EXTRUSION_AND_FLUSH HOTEND={HOTEND}
        {% endif %}
  {% endif %}  # === End multi-color system checks ===
  # Move to the next phase: preheat
  PRINT_START_SET PRINT_START_PHASE="preheat"


# =============================================================================
# Stage 3: preheat phase - stabilize bed/chamber temperatures and home axes
# =============================================================================
# Core function: efficient preheat management and temperature stabilization
# - Bed overshoot optimization: overshoot first, then settle to target temperature
# - Temperature check: intelligently determine whether target temperature is reached
# - Axis homing and nozzle cleaning: run in parallel during heating
# - Conditional probing preheat: choose extruder preheat strategy based on later actions
[gcode_macro _print_start_phase_preheat]
description: Inserted by slicer at start of print. Handles the bed and chamber
  heating phases and ends when both are stabilized at their target temperatures.
  Usage: See PRINT_START.
gcode:
  _PRINT_START_PHASE_CHECK PHASE=preheat                            # Verify phase state
  # === Get print parameters ===
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set BED = print.BED|int %}                                     # Bed temperature
  {% set HOTEND = print.HOTEND|int %}                               # Extruder temperature
  {% set CHAMBER = print.CHAMBER|default(0)|int %}                  # Chamber temperature
  {% set LAYERS = print.LAYERS|default(0)|int %}                    # Layer count
  {% set km = printer["gcode_macro _km_globals"] %}                 # Global parameters
  # === Smart bed-temperature state check ===
  # Determine whether bed temperature has reached target (error range: -0.2 to +1.0°C)
  {% set bed_at_target = (BED + 0.4 - printer.heater_bed.temperature) |
                           abs <= 0.6 %}                           # Whether bed temperature is already stable
  PRINT_START_SET BED_AT_TARGET={1 if bed_at_target else 0}          # Save bed-temperature state
  # === Decide temperature-related actions ===
  {% set start_level_bed_at_temp = km.start_level_bed_at_temp and
                                   not printer.bed_mesh.profile_name %} # Needs leveling at temperature
  {% set actions_at_temp = start_level_bed_at_temp or
                           km.start_quad_gantry_level_at_temp or
                           km.start_z_tilt_adjust_at_temp or
                           (km.start_home_z_at_temp and not bed_at_target) %} # Whether temperature-controlled actions are needed
  # === Compute bed-temperature overshoot ===
  {% set bed_overshoot = (BED + (km.start_bed_heat_overshoot if
             (BED and not bed_at_target) else 0.0),
           printer.configfile.settings.heater_bed.max_temp ) | min %} # Overshoot temperature (capped at max)

  # === Initialization and heater startup ===
  INIT_LAYER_GCODE LAYERS="{LAYERS}"                                # Initialize the layer-code system
  {% if CHAMBER > 0.0 %}
    M141 S{CHAMBER}                                                # Set chamber temperature
  {% endif %}
  M140 S{bed_overshoot}                                          # Start bed heating (overshoot mode)
  # === Axis homing and nozzle cleaning ===                                                # Home all axes
  CLEAR_NOZZLE HOTEND={HOTEND}                                   # Preheat and clean the nozzle


  # === Extruder preheat strategy ===
  {% if actions_at_temp %}                                       # Actions need to run at temperature
    # Probe mode: use probing temperature or partial preheat to avoid ooze
    M104 S{km.start_extruder_probing_temp if km.start_extruder_probing_temp > 0
      else (km.start_extruder_preheat_scale * HOTEND)|round(0,'ceil')|int}  # Set probing temperature
  {% else %}
    # Normal mode: directly set target or probing temperature
    M104 S{km.start_extruder_probing_temp if km.start_extruder_probing_temp > 0
      else HOTEND}                                              # Set extruder temperature
  {% endif %}

  # === Precise bed-temperature control flow ===
  {% if BED > 0.0 %}                                             # If bed heating is needed
    {% if not bed_at_target %}                                   # If the bed has not yet reached target temperature
      PARK                                                       # Park the printhead
      # === Overshoot-and-settle bed-temperature strategy ===
      M190 S{bed_overshoot}                                      # Wait for overshoot temperature
      G4 P{km.start_bed_heat_delay / 2}                          # Wait to stabilize (first half)
      M190 R{BED}                                                # Stabilize at target temperature
      G4 P{km.start_bed_heat_delay / 2}                          # Wait to stabilize (second half)
    {% endif %}
  {% endif %}

  # # === Chamber temperature control ===
  # {% if CHAMBER > 0.0 %}                                         # If chamber heating is needed
  #   _KM_PARK_IF_NEEDED HEATER="chamber" RANGE=ABOVE              # Park as needed (when temperature is below target)
  #   M191 S{CHAMBER}                                              # Wait for chamber to reach target temperature
  # {% endif %}

  # === Bed-temperature stability check ===
  {% if BED > 0.0 and bed_at_target%}                            # If bed heating was skipped earlier
    M190 R{BED}                                                  # Extra bed-temperature stability check
  {% endif %}

  # Move to the next phase: probing
  PRINT_START_SET PRINT_START_PHASE="probing"





# =============================================================================
# Stage 4: probing calibration phase - bed-mesh calibration
# =============================================================================
[gcode_macro _print_start_phase_probing]
gcode:
  _PRINT_START_PHASE_CHECK PHASE=probing                          # Verify phase state
  # === Get probing parameters ===
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set km = printer["gcode_macro _km_globals"] %}

  {% set HOTEND = print.HOTEND|int %}
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set start_level_bed_at_temp = km.start_level_bed_at_temp and
                                   not printer.bed_mesh.profile_name %}
  {% set start_home_z_at_temp = km.start_home_z_at_temp and
                                not print.BED_AT_TARGET|int %}
  {% set actions_at_temp = start_level_bed_at_temp or
                           km.start_quad_gantry_level_at_temp or
                           km.start_z_tilt_adjust_at_temp or
                           start_home_z_at_temp %}
  {% if actions_at_temp %}
    {% if km.start_extruder_probing_temp > 0 %}
    _KM_PARK_IF_NEEDED HEATER={printer.toolhead.extruder} RANGE=2    
    M109 R{km.start_extruder_probing_temp}
    {% else %}
      M104 S{HOTEND} # set the final extruder target temperature
    {% endif %}
    CUT_FILAMENT_1      #Cut filament


    {% if km.start_z_tilt_adjust_at_temp %}
      Z_TILT_ADJUST
    {% endif %}
    g29 #Leveling-compatible G29

    _km_apply_print_offset SET=1   #Load the saved Z offset

  {% endif %}
  PRINT_START_SET PRINT_START_PHASE="extruder"

# =============================================================================
# Stage 5: final extruder preheat phase
# =============================================================================
# Core function: finalize extruder temperature and enter printing state
[gcode_macro _print_start_phase_extruder]
description: Inserted by slicer at start of print. Preheats the extruder.
  Usage: See PRINT_START.
gcode:
  _PRINT_START_PHASE_CHECK PHASE=extruder                         # Verify phase state
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set HOTEND = print.HOTEND|default(print.HOTEND_TEMP)|float %} # Get the target extruder temperature
  {% set CHAMBER = print.CHAMBER|default(0)|int %}                  # Chamber temperature  
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set polar_cooler = printer.save_variables.variables.enable_polar_cooler|default(0) %}

  {% if CHAMBER == 0 %}
    M106 P3 S255
  {% endif %}

  M106 P4 S{polar_cooler}                    #Enable the polar cooler according to settings
  M106 S{HOTEND}
  #_KM_PARK_IF_NEEDED HEATER={printer.toolhead.extruder} RANGE=ABOVE    # Park when below temperature
  G1 X380 Y5  F30000
  M109 S{HOTEND}                                               # Wait for the extruder to reach target temperature
  ENABLE_ALL_SENSOR                                             #Enable all sensors
  PRINT_START_SET PRINT_START_PHASE="printing"                    # Set phase to printing

# =============================================================================

# Usage: _KM_PARK_IF_NEEDED HEATER=<heater> RANGE=[<percent>|ABOVE|BELOW]
[gcode_macro _km_park_if_needed]
description: Parks the extruder if the current temperature of the supplied
  heater is not within the specified target range.
  Usage: _KM_PARK_IF_NEEDED HEATER=<heater> RANGE=[<percentage>|ABOVE|BELOW]
gcode:
  # === Parse heater and range parameters ===
  # Note: must be called as a standalone macro to get live temperature
  {% set HEATER = params.HEATER if params.HEATER in
                    printer.heaters.available_heaters else
                  ("heater_generic " ~ params.HEATER) %}           # Automatically identify the heater type
  {% set RANGE = (params.RANGE|default(1))|string|upper %}         # Range parameter (default 1%)

  # === Temperature-condition checks and parking decisions ===
  {% if printer[HEATER].target %}                                 # If the heater has a target temperature
    {% if RANGE == "ABOVE" %}                                     # ABOVE mode: park when temperature is below target
      {% if printer[HEATER].temperature < printer[HEATER].target %}
        PARK                                                     # Execute park
      {% endif %}
    {% elif RANGE == "BELOW" %}                                  # BELOW mode: park when temperature is above target
      {% if printer[HEATER].temperature > printer[HEATER].target %}
        PARK                                                     # Execute park
      {% endif %}
    {% elif (printer[HEATER].temperature - printer[HEATER].target)|abs >
             (printer[HEATER].target * RANGE|float * 0.01)|abs %}  # Percent mode: park when the error exceeds the percentage
      PARK                                                       # Execute park
    {% endif %}
  {% endif %}




#Print Z_OFFSET management macro
[gcode_macro _km_apply_print_offset]          
variable_offset: []                                              # Variable storing the current offset value
gcode:
  {% if params.RESET|default(0)|int %}
    # SAVE_VARIABLE VARIABLE=z_offset VALUE=0
    SET_GCODE_OFFSET Z=0 MOVE=0
  {% elif params.SET|default(0)|int %}
    {% set z = printer.save_variables.variables.z_offset|default(0) %}
    SET_GCODE_OFFSET Z={z} MOVE=0
  {% elif params.SAVE|default(0)|int %}
    {% if printer.gcode_move.homing_origin.z < 0.5 %}
       SAVE_VARIABLE VARIABLE=z_offset VALUE={printer.gcode_move.homing_origin.z}
    {% endif %}
  {% endif %}



# =============================================================================
# Print-parameter storage macro - used to pass and store parameters between phases
# =============================================================================
# Core function: provide persistent parameter storage for all PRINT_START phases
# Usage: PRINT_START_SET <variable>=<value>
[gcode_macro print_start_set]
description: Inserted by slicer to set values used by PRINT_START.
  Usage: PRINT_START_SET <VARIABLE>=<value>
variable_print: {}                                               # Dictionary storing all print parameters
gcode:
  # === Dynamically set parameters ===
  {%for k in params %}                                           # Iterate through all provided parameters
    {% set dummy = print.__setitem__(k|upper, params[k]) %}      # Uppercase the parameter name and store it
  {% endfor %}

# =============================================================================
# Phase-state check macro - verify print-start phase correctness and order
# =============================================================================
# Core function: ensure print phases run in the expected order and prevent out-of-order execution
[gcode_macro _print_start_phase_check]
gcode:
  {% set print = printer["gcode_macro print_start_set"].print %}
  {% set PRINT_START_PHASE = print.PRINT_START_PHASE|default("none") %}
  {% if PRINT_START_PHASE != params.PHASE %}
    # Reset the phases manually just to be sure.
    SET_GCODE_VARIABLE MACRO=print_start_set VARIABLE=print VALUE="{{}}"
    {% if params.PHASE != 'none' %}
      {% set error = "PRINT_START phase error. Expected '%s' but found '%s'" %
                       (params.PHASE, PRINT_START_PHASE) %}
      # Do the cancel manually if we're not confident it will fire.
      {% if not 'virtual_sdcard' in printer or
            not printer.virtual_sdcard.is_active or 'CANCEL_PRINT' not in
              printer.configfile.settings.virtual_sdcard.on_error_gcode|
                default("")|upper %}
        {action_respond_info(error)}
        CANCEL_PRINT
      {% else %}
        {action_raise_error(error)}
      {% endif %}
    {% else %}
      { action_respond_info("Expected phase '%s' but found '%s'. Resetting."
                             % (params.PHASE, PRINT_START_PHASE)) }
    {% endif %}
  {% endif %}

# =============================================================================
# Main print-end flow - entry point called by the slicer
# =============================================================================
# Core function: safely shut down all systems and restore the initial state
# - Clean the printhead and bed surface
# - Turn off all heaters and fans
# - Disable steppers and sensors
# - Clear all print states and settings
[gcode_macro print_end]
description: Inserted by slicer at end of print.
  Usage: PRINT_END
gcode:
  _KM_CHECK_IS_PRINTING                                          # Verify that printing is active
  M400                                                           # Wait for all actions to complete
  _PRINT_END_INNER                                               # Run the internal end-of-print flow

  {% set km = printer["gcode_macro _km_globals"] %}

  # === Reset all adjustment parameters ===
  {% if km.start_clear_adjustments_at_end != 0 %}               # If clearing adjustments is configured

    RESET_FAN_SCALING                                            # Reset fan scaling
    M220 S100                                                    # Reset speed multiplier to 100%
    M221 S100                                                    # Reset flow multiplier to 100%
  {% endif %}
  # === System reset and shutdown ===
  _RESET_LAYER_GCODE                                             # Reset the layer-code system
  _RESET_VELOCITY_LIMITS                                         # Reset velocity limits
  TURN_OFF_HEATERS                                               # Turn off all heaters
  M107                                                           # Turn off the main fan
  M106 P2 S0                                                     # Turn off auxiliary fan 2
  #M106 P3 S0                                                     # Turn off auxiliary fan 3
  M106 P4 S0                                                     # Turn off the polar cooler

  {% if printer.bed_mesh %}BED_MESH_CLEAR{% endif %}             # Clear bed-mesh data
  G31

  # === Stepper and sensor control ===
  # M84 ; Disable all steppers (replaced by finer-grained control)
  M84
  DISABLE_ALL_SENSOR                                             # Disable all sensors

  {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 and printer["box_extras"]%}
    BUFFER_MONITORING ENABLE=0
  {% endif %}     ####Buffer
  # === Clear print state and settings ===
  CLEAR_PAUSE                                                    # Clear the pause state
  _KM_BEEP_IF_AVAILABLE BEEPS=10                                 #End-of-print audible alert
  SET_GCODE_VARIABLE MACRO=print_start_set VARIABLE=print VALUE="{{}}" # Clear print parameters
  SET_PRINT_MAIN_STATUS MAIN_STATUS=ready                       # Set main status to ready
  # # === File-system cleanup ===
  # SDCARD_RESET_FILE                                              # Reset SD-card file state
  # CLEAR_LAST_FILE                                                # Clear the last printed-file record

# =============================================================================
# Internal end-of-print flow - handle cleanup and parking moves
# =============================================================================
[gcode_macro _print_end_inner]
variable_cancelled: False                                        # Cancelled-flag variable
gcode:
  SET_GCODE_VARIABLE MACRO=_print_end_inner VARIABLE=cancelled VALUE="{False}" # Reset the cancel flag
  # === Get system parameters ===
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set toolhead = printer.toolhead %}
  {% set origin = printer.gcode_move.homing_origin%}             # Homing origin
  # === Compute maximum travel range ===
  {% set max_x = km.print_max[0] - origin.x %}                   # Maximum X position
  {% set max_y = km.print_max[1] - origin.y %}                   # Maximum Y position
  {% set max_z = toolhead.axis_maximum.z - origin.z %}           # Maximum Z position

  # === Status update ===
  {% if not cancelled %}                                         # If this is not a cancelled print
    SET_PRINT_MAIN_STATUS MAIN_STATUS=print_completing          # Set main status
  {% endif %}
  _KM_APPLY_PRINT_OFFSET SAVE=1                         #Save first
  _KM_APPLY_PRINT_OFFSET RESET=1                         # Remove print-position offset




# =============================================================================
# Print-state check macro - verify that a print is currently active
# =============================================================================
[gcode_macro _km_check_is_printing]
variable_debug_state: False                                      # Debug mode (disables state checks)
description: Throws an error if print is not currently in progress.
gcode:
  # === Multi-state print checks ===
  {% if not debug_state and
        printer.idle_timeout.state|string != "Printing" and         # Idle-timeout state is not Printing
        not (printer.virtual_sdcard|default({})).is_active|default(False) and # Virtual SD card is not active
        not printer.pause_resume.is_paused %}                       # Pause/resume is not active
    { action_raise_error("No active print.") }                     # Raise an error: no active print
  {% endif %}

# =============================================================================
# Print-boundary check-and-set macro - validate all print bounds and cache the values
# =============================================================================
# Core function: verify MESH and MODEL bounds are within safe limits and set print limits
[gcode_macro _km_check_and_set_print_bounds]
description: Validates all print bounds and caches their values.
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set print = printer["gcode_macro print_start_set"].print %}

  # === Check mesh bounds ===
  {% if print.MESH_MIN %}                                          # If mesh bounds were specified
    {% set MESH_MIN = print.MESH_MIN.split(",")|map('float')|list %}  # Parse minimum mesh bounds
    {% set MESH_MAX = print.MESH_MAX.split(",")|map('float')|list %}  # Parse maximum mesh bounds
    # === Mesh-bound safety validation ===
    {%if MESH_MIN[0] < km.print_min[0] or MESH_MIN[1] < km.print_min[1] %}
      {action_raise_error("MESH_MIN %s is outside the printable bounds %s" %
                            (MESH_MIN|string, km.print_min|string))}    # Mesh minimum is out of bounds
    {%elif MESH_MAX[0] > km.print_max[0] or MESH_MAX[1] > km.print_max[1] %}
      {action_raise_error("MESH_MAX %s is outside the printable bounds %s" %
                            (MESH_MAX|string, km.print_max|string))}    # Mesh maximum is out of bounds
    {% endif %}
  {% endif %}

  # === Find all model bounds (including provided bounds) ===
  {% set points = [] %}                                            # Initialize the point set
  {% if print.MODEL_MIN or print.MODEL_MAX %}                      # If model bounds were specified
    {% set MODEL_MIN = print.MODEL_MIN.split(",")|map('float')|list %} # Parse minimum model bounds
    {% set MODEL_MAX = print.MODEL_MAX.split(",")|map('float')|list %} # Parse maximum model bounds
    {% set points = [MODEL_MIN, MODEL_MAX] %}                     # Set the initial point set
  {% endif %}
  # === Get bounds from the exclude-object system ===
  {% if (printer.exclude_object|default({})).objects %}           # If the exclude-object feature is enabled
    {% set points = printer.exclude_object.objects|selectattr('polygon')|
                      map(attribute='polygon')|sum(start=points) %} # Collect polygon points from all objects
    {% set points_len = points|length %}                          # Get the point count
    {% if points_len >= 2 %}                                      # If there are enough points
      {% set x_coords = (points|map(attribute=0)|sort|list)[0::points_len-1] %} # Get min/max X coordinates
      {% set y_coords = (points|map(attribute=1)|sort|list)[0::points_len-1] %} # Get min/max Y coordinates
      {% set MODEL_MIN = (x_coords[0],y_coords[0])|map('float')|list %} # Compute the minimum model bounds
      {% set MODEL_MAX = (x_coords[1],y_coords[1])|map('float')|list %} # Compute the maximum model bounds
      PRINT_START_SET MODEL_MIN="{MODEL_MIN|join(',')
                   }" MODEL_MAX="{MODEL_MAX|join(',')}"      # Save the computed model bounds
    {% endif %}
  {% endif %}

  # === Model-bound safety validation ===
  {% if MODEL_MIN %}                                               # If model-bound data exists
    {% if MODEL_MIN[0] < km.print_min[0] or MODEL_MIN[1] < km.print_min[1] %}
      {action_raise_error("MODEL_MIN %s is outside the printable bounds %s" %
                            (MODEL_MIN|string, km.print_min|string))} # Model minimum is out of bounds
    {% elif MODEL_MAX[0] > km.print_max[0] or MODEL_MAX[1] > km.print_max[1] %}
      {action_raise_error("MODEL_MAX %s is outside the printable bounds %s" %
                            (MODEL_MAX|string, km.print_max|string))} # Model maximum is out of bounds
    {% endif %}
  {% endif %}

  # === Set final print limits ===
  {% if MESH_MIN and MODEL_MIN %}                                 # If both mesh and model bounds exist
    # Take the union of both: smaller minima and larger maxima
    PRINT_START_SET PRINT_MIN="{((MODEL_MIN[0],MESH_MIN[0])|min,
                                 (MODEL_MIN[1],MESH_MIN[1])|min)|join(',')
                  }" PRINT_MAX="{((MODEL_MAX[0],MESH_MAX[0])|max,
                                  (MODEL_MAX[1],MESH_MAX[1])|max)|join(',')}"
  {% else %}                                                     # Otherwise use the default print range
    PRINT_START_SET PRINT_MIN="{km.print_min|join(',')
                 }" PRINT_MAX="{km.print_max|join(',')}"        # Use the globally configured print range
  {% endif %}

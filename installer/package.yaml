# Installer manifest for staged optimized-macro install and guarded stock-value patches.

schema_version: 1

package:
  id: qidi-max4-optimized
  display_name: QIDI Max 4 Optimized
  printer_model: qidi-max4
  version: "26.06.11.1"
  known_versions:
    - "26.04.21.1"
    - "26.04.27.1"
    - "26.04.27.2"
    - "26.04.27.3"
    - "26.04.27.4"
    - "26.05.04.1"
    - "26.05.19.1"
    - "26.05.20.1"
    - "26.05.21.1"
    - "26.05.27.1"
    - "26.06.01.1"
    - "26.06.02.1"
    - "26.06.03.1"
    - "26.06.04.1"
    - "26.06.11.1"

firmware:
  supported:
    - "01.01.06.03"
    - "01.01.06.04"

backup:
  source_directory: "config"
  label_prefix: "tltg-optimized-macros-before-optimize"

state:
  record_file: "config/tltg_optimized_state.yaml"

preflight:
  required_files:
    - "config/printer.cfg"
    - "config/klipper-macros-qd/bed_mesh.cfg"
    - "config/klipper-macros-qd/filament.cfg"
    - "config/klipper-macros-qd/kinematics.cfg"
    - "config/klipper-macros-qd/start_end.cfg"

  required_sections:
    - file: "config/printer.cfg"
      section: "save_variables"
    - file: "config/klipper-macros-qd/bed_mesh.cfg"
      section: "gcode_macro g29"
    - file: "config/klipper-macros-qd/filament.cfg"
      section: "gcode_macro CUT_FILAMENT_1"
    - file: "config/klipper-macros-qd/start_end.cfg"
      section: "gcode_macro print_start"

  required_lines:
    - file: "config/printer.cfg"
      line: "[include klipper-macros-qd/*.cfg]"

install:
  ensure_directories:
    - "config/tltg-optimized-macros"

  managed_tree:
    id: optimized_macro_tree
    source: "klipper/tltg-optimized-macros"
    destination: "config/tltg-optimized-macros"
    mode: mirror
    required_files:
      - "bed_mesh.cfg"
      - "cancel.cfg"
      - "cooling.cfg"
      - "filament.cfg"
      - "globals.cfg"
      - "heaters.cfg"
      - "helpers.cfg"
      - "kinematics.cfg"
      - "motion.cfg"
      - "offset.cfg"
      - "start_end.cfg"

  ensure_lines:
    - id: include_optimized_macros
      file: "config/printer.cfg"
      line: "[include tltg-optimized-macros/*.cfg]"
      after: "[include klipper-macros-qd/*.cfg]"

patches:
  set_options:
    - id: stepper_x_homing_speed
      file: "config/printer.cfg"
      section: "stepper_x"
      option: "homing_speed"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "50"
          desired: "65"
        - firmwares: ["01.01.06.04"]
          expected: "50"
          desired: "65"

    - id: stepper_x_second_homing_speed
      file: "config/printer.cfg"
      section: "stepper_x"
      option: "second_homing_speed"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "50.0"
          desired: "55.0"
        - firmwares: ["01.01.06.04"]
          expected: "50.0"
          desired: "55.0"

    - id: stepper_x_homing_retract_dist
      file: "config/printer.cfg"
      section: "stepper_x"
      option: "homing_retract_dist"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "50.0"
          desired: "20.0"
        - firmwares: ["01.01.06.04"]
          expected: "50.0"
          desired: "20.0"

    - id: stepper_x_homing_retract_speed
      file: "config/printer.cfg"
      section: "stepper_x"
      option: "homing_retract_speed"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "200.0"
          desired: "1000.0"
        - firmwares: ["01.01.06.04"]
          expected: "200.0"
          desired: "1000.0"

    - id: stepper_y_homing_speed
      file: "config/printer.cfg"
      section: "stepper_y"
      option: "homing_speed"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "50"
          desired: "65"
        - firmwares: ["01.01.06.04"]
          expected: "50"
          desired: "65"

    - id: stepper_y_second_homing_speed
      file: "config/printer.cfg"
      section: "stepper_y"
      option: "second_homing_speed"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "50.0"
          desired: "55.0"
        - firmwares: ["01.01.06.04"]
          expected: "50.0"
          desired: "55.0"

    - id: stepper_y_homing_retract_dist
      file: "config/printer.cfg"
      section: "stepper_y"
      option: "homing_retract_dist"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "50.0"
          desired: "20.0"
        - firmwares: ["01.01.06.04"]
          expected: "50.0"
          desired: "20.0"

    - id: stepper_y_homing_retract_speed
      file: "config/printer.cfg"
      section: "stepper_y"
      option: "homing_retract_speed"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "200.0"
          desired: "1000.0"
        - firmwares: ["01.01.06.04"]
          expected: "200.0"
          desired: "1000.0"

    - id: stepper_z_homing_retract_dist
      file: "config/printer.cfg"
      section: "stepper_z"
      option: "homing_retract_dist"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "10.0"
          desired: "5.0"
        - firmwares: ["01.01.06.04"]
          expected: "10.0"
          desired: "5.0"

    - id: z_tilt_speed
      file: "config/printer.cfg"
      section: "z_tilt"
      option: "speed"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "150"
          desired: "600"
        - firmwares: ["01.01.06.04"]
          expected: "150"
          desired: "600"

    - id: bed_mesh_speed
      file: "config/printer.cfg"
      section: "bed_mesh"
      option: "speed"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "150"
          desired: "600"
        - firmwares: ["01.01.06.04"]
          expected: "150"
          desired: "600"

    - id: virtual_sdcard_on_error_gcode
      file: "config/printer.cfg"
      section: "virtual_sdcard"
      option: "on_error_gcode"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "CANCEL_PRINT"
          desired: "OPTIMIZED_CANCEL_PRINT_ON_ERROR"
        - firmwares: ["01.01.06.04"]
          expected: "CANCEL_PRINT"
          desired: "OPTIMIZED_CANCEL_PRINT_ON_ERROR"

    - id: timelapse_take_frame_verbose
      file: "config/timelapse.cfg"
      section: "gcode_macro TIMELAPSE_TAKE_FRAME"
      option: "variable_verbose"
      variants:
        - firmwares: ["01.01.06.03"]
          expected: "True"
          desired: "False"
        - firmwares: ["01.01.06.04"]
          expected: "True"
          desired: "False"

    - id: closed_loop_x_query_cycle
      file: "config/printer.cfg"
      section: "closed_loop x"
      option: "query_cycle"
      variants:
        - firmwares: ["01.01.06.04"]
          expected: "5"
          desired: "10"

    - id: closed_loop_y_query_cycle
      file: "config/printer.cfg"
      section: "closed_loop y"
      option: "query_cycle"
      variants:
        - firmwares: ["01.01.06.04"]
          expected: "5"
          desired: "10"

    - id: closed_loop_x_trigger_current
      file: "config/printer.cfg"
      section: "closed_loop x"
      option: "trigger_current"
      variants:
        - firmwares: ["01.01.06.04"]
          expected: "400"
          desired: "400"

    - id: closed_loop_x_trigger_time
      file: "config/printer.cfg"
      section: "closed_loop x"
      option: "trigger_time"
      variants:
        - firmwares: ["01.01.06.04"]
          expected: "2"
          desired: "2"

    - id: closed_loop_x_trigger_speed
      file: "config/printer.cfg"
      section: "closed_loop x"
      option: "trigger_speed"
      variants:
        - firmwares: ["01.01.06.04"]
          expected: "50"
          desired: "50"

    - id: closed_loop_y_trigger_current
      file: "config/printer.cfg"
      section: "closed_loop y"
      option: "trigger_current"
      variants:
        - firmwares: ["01.01.06.04"]
          expected: "400"
          desired: "400"

    - id: closed_loop_y_trigger_time
      file: "config/printer.cfg"
      section: "closed_loop y"
      option: "trigger_time"
      variants:
        - firmwares: ["01.01.06.04"]
          expected: "2"
          desired: "2"

    - id: closed_loop_y_trigger_speed
      file: "config/printer.cfg"
      section: "closed_loop y"
      option: "trigger_speed"
      variants:
        - firmwares: ["01.01.06.04"]
          expected: "50"
          desired: "50"

    - id: chamber_thermal_protection_sensor_max_temp
      file: "config/printer.cfg"
      section: "temperature_sensor Chamber_Thermal_Protection_Sensor"
      option: "max_temp"
      variants:
        - firmwares: ["01.01.06.04"]
          expected: "150"
          desired: "170"

    - id: official_fila25_filament
      file: "config/officiall_filas_list.cfg"
      section: "fila25"
      option: "filament"
      variants:
        - firmwares: ["01.01.06.04"]
          expected: "PA-CF"
          desired: "PA6-CF"

    - id: official_fila25_type
      file: "config/officiall_filas_list.cfg"
      section: "fila25"
      option: "type"
      variants:
        - firmwares: ["01.01.06.04"]
          expected: "PA-CF"
          desired: "PA6-CF"

  delete_sections:
    - id: kinematics_homing_override
      file: "config/klipper-macros-qd/kinematics.cfg"
      section: "homing_override"
      variants:
        - firmwares: ["01.01.06.03"]
          expected_normalized_sha256: "6a924478b351dea193bf1060f5747b151bba3de4c5627c7faac741ad7b164cf4"
        - firmwares: ["01.01.06.04"]
          expected_normalized_sha256: "6a924478b351dea193bf1060f5747b151bba3de4c5627c7faac741ad7b164cf4"

    - id: start_end_apply_print_offset
      file: "config/klipper-macros-qd/start_end.cfg"
      section: "gcode_macro _km_apply_print_offset"
      variants:
        - firmwares: ["01.01.06.03"]
          expected_normalized_sha256: "ea8be4dae3bc5bbe881b8e3ca5c49e0b28a74b17cb9a4d8515d598bd006ce3a7"
        - firmwares: ["01.01.06.04"]
          expected_normalized_sha256: "ea8be4dae3bc5bbe881b8e3ca5c49e0b28a74b17cb9a4d8515d598bd006ce3a7"

postflight:
  verify_lines:
    - file: "config/printer.cfg"
      line: "[include tltg-optimized-macros/*.cfg]"

system_optimizations:
  enabled_by_default: true
  dns:
    resolv_conf: /etc/resolv.conf
    resolvconf_head: /etc/resolvconf/resolv.conf.d/head
    resolvconf_tail: /etc/resolvconf/resolv.conf.d/tail
    target_symlink: /run/resolvconf/resolv.conf
    fallback_nameservers:
      - 1.1.1.1
      - 8.8.8.8
  apt_sources:
    file: /etc/apt/sources.list
    content: |
      deb http://deb.debian.org/debian bullseye main contrib
      deb-src http://deb.debian.org/debian bullseye main contrib
      deb http://security.debian.org/debian-security bullseye-security main contrib
      deb-src http://security.debian.org/debian-security bullseye-security main contrib
      deb http://deb.debian.org/debian bullseye-updates main contrib
      deb-src http://deb.debian.org/debian bullseye-updates main contrib
  services:
    disable:
      - xl2tpd
      - bluetooth
    optional_disable:
      - id: algo_app
        service: algo_app.service
        prompt: Would you like us to disable QIDI AI detection features?
  qidiclient_static_gifs:
    archive: system/qidiclient-static-gifs.tar.gz
    sha256: 616c11226addbc09c9d4dc83b0e1d359f15e2f4c1d84c1d8bb008f841d616fce
    destination: /home/qidi/QIDI_Client/access
    restart_service: qidi-client.service

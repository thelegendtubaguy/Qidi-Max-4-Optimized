# Optimized cooling helpers

[gcode_macro OPTIMIZED_M1004]
description: Enable air conditioner per settings with optimized default.
gcode:
    {% set polar_cooler = printer.save_variables.variables.enable_polar_cooler|default(0) %}
    M106 P4 S{polar_cooler}

[gcode_macro OPTIMIZED_DISABLE_BOX_HEATER]
description: Disables the QIDI Box heater when the box stack is available.
gcode:
    {% if printer["box_extras"] is defined %}
        DISABLE_BOX_HEATER
    {% endif %}

[gcode_macro TLTG_SET_BOX_TEMP]
description: Sets a QIDI Box heater target by box number.
gcode:
    {% if params.BOX is not defined or params.TARGET is not defined %}
        {action_raise_error("Usage: TLTG_SET_BOX_TEMP BOX=<number> TARGET=<0..max>")}
    {% endif %}
    {% set box = params.BOX|int %}
    {% set target = params.TARGET|float %}
    {% set heater = "heater_box" ~ box %}
    {% set heater_object = "heater_generic " ~ heater %}
    {% set config_section = "box_config box" ~ (box - 1) %}
    {% set box_settings = printer.configfile.settings[config_section]|default({}) %}
    {% set target_max = box_settings.target_max_temp_heater_generic|default(90)|float %}
    {% if box < 1 %}
        {action_raise_error("BOX must be 1 or greater")}
    {% endif %}
    {% if heater_object not in printer.heaters.available_heaters %}
        {action_raise_error("QIDI Box heater is not available: " ~ heater)}
    {% endif %}
    {% if target < 0 or target > target_max %}
        {action_raise_error("TARGET must be between 0 and " ~ target_max|string)}
    {% endif %}
    SET_HEATER_TEMPERATURE HEATER={heater} TARGET={target}

[gcode_macro OPTIMIZED_END_FAN_COOLDOWN]
description: Run chamber fan P3 after print and stop later.
variable_speed: 0
gcode:
    {% set speed = params.S|default(120)|int %}
    {% set duration = params.T|default(180)|int %}
    {% set speed = [0, [speed, 255]|min]|max %}
    {% set duration = [0, duration]|max %}

    UPDATE_DELAYED_GCODE ID=_optimized_end_fan_cooldown_off DURATION=0
    {% if speed > 0 and duration > 0 %}
        M106 P3 S{speed}
        SET_GCODE_VARIABLE MACRO=OPTIMIZED_END_FAN_COOLDOWN VARIABLE=speed VALUE={speed}
        UPDATE_DELAYED_GCODE ID=_optimized_end_fan_cooldown_off DURATION={duration}
    {% else %}
        M106 P3 S0
        SET_GCODE_VARIABLE MACRO=OPTIMIZED_END_FAN_COOLDOWN VARIABLE=speed VALUE=0
    {% endif %}

[delayed_gcode _optimized_end_fan_cooldown_off]
gcode:
    {% set print_active = printer.idle_timeout.state|string == "Printing" or (printer.virtual_sdcard|default({})).is_active|default(False) or printer.pause_resume.is_paused|default(False) %}
    {% if not print_active %}
        M106 P3 S0
    {% endif %}
    SET_GCODE_VARIABLE MACRO=OPTIMIZED_END_FAN_COOLDOWN VARIABLE=speed VALUE=0

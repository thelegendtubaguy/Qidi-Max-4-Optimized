# Optimized bed-mesh helpers

[gcode_macro _OPTIMIZED_G29_HOME_Z_OR_FULL]
description: Homes Z only when XY is already homed; otherwise runs full home.
gcode:
  {% set homed = printer.toolhead.homed_axes|lower %}
  {% if 'x' in homed and 'y' in homed %}
        _OPTIMIZED_MOVE_TO_Z_HOME_POINT
        M400
        G28.6245197 Z
  {% else %}
        OPTIMIZED_G28
  {% endif %}

[gcode_macro OPTIMIZED_G29_ZSAFE]
description: Optimized G29 variant that avoids redundant XY rehome when possible.
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}

  SET_STEPPER_ENABLE STEPPER=extruder enable=0
  BED_MESH_CLEAR
  {% if km.bedmesh_before_print|int == 1 %}
        _OPTIMIZED_G29_HOME_Z_OR_FULL
        BED_MESH_CALIBRATE PROFILE=kamp
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"kamp"'
        G4 P500
        SAVE_CONFIG_QD
  {% else %}
    {% if printer["bed_mesh"].profiles.default %}
        BED_MESH_PROFILE LOAD=default
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
      {% else %}
            _OPTIMIZED_G29_HOME_Z_OR_FULL
            BED_MESH_CALIBRATE PROFILE=default
            SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
            G4 P500
            SAVE_CONFIG_QD
      {% endif %}
    {% endif %}

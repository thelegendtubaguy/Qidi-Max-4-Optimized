# Optimized print-start entry helpers

[gcode_macro OPTIMIZED_PRINT_START_HOME]
description: Preheats to the print-start probing temperature before homing.
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}
  M104 S{km.start_extruder_probing_temp if km.start_extruder_probing_temp > 0 else 140}
  OPTIMIZED_G28 STATUS=tool_head_reset LAZY=0

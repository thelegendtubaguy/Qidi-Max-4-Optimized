# Helpful user tools for manual diagnostics and calibration.

[screws_tilt_adjust]
screw1: 30,30
screw1_name: Front left
screw2: 345,30
screw2_name: Front right
screw3: 345,345
screw3_name: Rear right
screw4: 30,345
screw4_name: Rear left
speed: 150
horizontal_move_z: 5
screw_thread: CW-M4

[gcode_macro TLTG_PROBE_ACCURACY_CENTER]
description: Homes and runs probe accuracy sampling at the bed center.
gcode:
  {% set samples = params.SAMPLES|default(20)|int %}
  G28
  G90
  G1 Z10 F480
  G1 X195 Y195 F24000
  M400
  PROBE_ACCURACY SAMPLES={samples}

[gcode_macro TLTG_CORNER_BED_SCREW_CHECK]
description: Homes, runs Z tilt, then reports bed screw turn adjustments.
gcode:
  G28
  Z_TILT_ADJUST
  M400
  SCREWS_TILT_CALCULATE

# Optimized heater wait helpers with explicit startup statuses

[gcode_macro OPTIMIZED_WAIT_HOTEND]
description: Waits for the active hotend while preserving an optimized sub-status.
gcode:
  {% set extruder = "extruder" ~ params.T|replace('0', '') if "T" in params else printer.toolhead.extruder %}
  {% set status = params.STATUS|default("extruder_heating") %}
  SET_PRINT_SUB_STATUS SUB_STATUS={status}
  _GCODE_WAIT_WRAPPER HEATER={extruder}{% for k in params if k != "STATUS" %}{' ' ~ k ~ '="' ~ params[k] ~ '"'}{% endfor %}

[gcode_macro OPTIMIZED_WAIT_BED]
description: Waits for the bed while preserving an optimized sub-status.
gcode:
  {% set status = params.STATUS|default("bed_heating") %}
  SET_PRINT_SUB_STATUS SUB_STATUS={status}
  _GCODE_WAIT_WRAPPER HEATER=heater_bed {% for k in params if k != "STATUS" %}{' ' ~ k ~ '="' ~ params[k] ~ '"'}{% endfor %}

[gcode_macro OPTIMIZED_WAIT_CHAMBER]
description: Waits for the chamber while preserving an optimized sub-status.
gcode:
  {% if printer["heater_generic chamber"] is defined %}
    {% if "R" in params %}
      {% set dummy = params.__setitem__("S", params.R) %}
    {% endif %}
    {% set target = params.S|default(0)|float %}
    {% set status = params.STATUS|default("chamber_heating") %}
    {% if target > 0.0 %}
      SET_PRINT_SUB_STATUS SUB_STATUS={status}
      {% if printer["fan_generic chamber_circulation_fan"] is defined %}
        SET_FAN_SPEED FAN=chamber_circulation_fan SPEED=0
      {% endif %}
      SET_HEATER_TEMPERATURE_SCALED HEATER=chamber TARGET={target}
      TEMPERATURE_WAIT SENSOR="heater_generic chamber" MINIMUM={([target, 65]|min)-2}
    {% endif %}
  {% endif %}

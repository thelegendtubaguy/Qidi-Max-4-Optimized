# Optimized timelapse helpers

[gcode_macro OPTIMIZED_TIMELAPSE_TAKE_FRAME]
description: Takes slicer-requested timelapse frames only when Klipper timelapse is enabled.
gcode:
  {% set timelapse_type = params.TYPE|default(-1)|int %}
  {% set layer_z = params.LAYER_Z|default(0)|float %}
  {% set retraction_length = params.RETRACTION_LENGTH|default(0)|float %}

  {% if printer['gcode_macro TIMELAPSE_TAKE_FRAME'] is defined and printer['gcode_macro TIMELAPSE_TAKE_FRAME'].enable %}
    {% if timelapse_type == 1 %}
      G92 E0
      G1 E-{retraction_length} F1800
      G2 Z{layer_z + 0.4} I0.86 J0.86 P1 F20000
      OPTIMIZED_MOVE_TO_TRASH
      {% if layer_z <= 25 %}
        G1 Z25
      {% endif %}
      G92 E0
      M400
      TIMELAPSE_TAKE_FRAME
      G1 E{retraction_length} F300
      G1 X180 F8000
      G1 Y380
      {% if layer_z <= 25 %}
        G1 Z{layer_z}
      {% endif %}
    {% elif timelapse_type == 0 %}
      TIMELAPSE_TAKE_FRAME
    {% endif %}
  {% endif %}

# Optimized homing helpers

[gcode_macro _OPTIMIZED_MOVE_TO_Z_HOME_POINT]
description: Moves to a slightly randomized XY point before Z homing.
gcode:
  {% set km = printer["gcode_macro _km_globals"] %}
  {% set opt = printer["gcode_macro _tltg_optimized_globals"] %}
  {% set center_x = (km.print_min[0] + km.print_max[0]) / 2 %}
  {% set center_y = (km.print_min[1] + km.print_max[1]) / 2 %}
  {% set radius = opt.z_home_randomize_radius|default(0)|int %}
  {% set min_x = km.print_min[0] %}
  {% set max_x = km.print_max[0] %}
  {% set min_y = km.print_min[1] %}
  {% set max_y = km.print_max[1] %}
  {% if opt.z_home_randomize_enable|default(1)|int and radius > 0 %}
    {% set target_x = [max_x, [min_x, center_x + (range(-radius, radius + 1)|random)]|max]|min %}
    {% set target_y = [max_y, [min_y, center_y + (range(-radius, radius + 1)|random)]|max]|min %}
  {% else %}
    {% set target_x = center_x %}
    {% set target_y = center_y %}
  {% endif %}
  G90
  G1 X{target_x} Y{target_y} F{opt.move_to_z_travel_speed_xy}

[gcode_macro _OPTIMIZED_PREP_XY_HOME]
description: Sets a safe kinematic position and staging move before X/Y homing.
gcode:
  {% set opt = printer["gcode_macro _tltg_optimized_globals"] %}
  {% set settle_short = opt.homing_settle_short|int %}
  {% set set_z = params.SET_Z|default(0)|int %}
  {% set move_z = params.MOVE_Z|default(0)|int %}
  {% set move_x = params.MOVE_X|default(0)|int %}
  {% set move_y = params.MOVE_Y|default(0)|int %}
  {% if set_z %}
    SET_KINEMATIC_POSITION Z=280
  {% endif %}
  SET_KINEMATIC_POSITION X=150
  SET_KINEMATIC_POSITION Y=150
  SET_STEPPER_ENABLE STEPPER=stepper_x enable=0
  SET_STEPPER_ENABLE STEPPER=stepper_y enable=0
  G4 P{settle_short}
  {% if move_z or move_x or move_y %}
    G91
    {% if move_z %}
      G1 Z{move_z} F480
    {% endif %}
    {% if move_x %}
      G1 X{move_x} F3000
    {% endif %}
    {% if move_y %}
      G1 Y{move_y} F3000
    {% endif %}
    G90
    M400
  {% endif %}
  SET_STEPPER_ENABLE STEPPER=stepper_x enable=0
  SET_STEPPER_ENABLE STEPPER=stepper_y enable=0
  G4 P{settle_short}

[gcode_macro _OPTIMIZED_HOME_Y_AND_BACKOFF]
description: Homes Y and backs off from the endstop.
gcode:
  G28.6245197 Y
  M400
  G91
  G1 Y20 F24000
  G90
  M400

[gcode_macro _OPTIMIZED_HOME_X_AND_BACKOFF]
description: Homes X and backs off from the endstop.
gcode:
  G28.6245197 X
  M400
  G91
  G1 X-20 F24000
  G90
  M400

[gcode_macro _OPTIMIZED_RESTORE_XY_HOMING_STATE]
description: Restores XY steppers to normal run state after homing.
gcode:
  {% set opt = printer["gcode_macro _tltg_optimized_globals"] %}
  {% set settle_short = opt.homing_settle_short|int %}
  {% set settle_long = opt.homing_settle_long|int %}
  SET_HOMING_STATE STEPPER=y VALUE=2
  G4 P{settle_short}
  SET_HOMING_STATE STEPPER=x VALUE=2
  G4 P{settle_short}
  SET_HOMING_MODE STEPPER=y VALUE=2
  G4 P{settle_short}
  SET_HOMING_MODE STEPPER=x VALUE=2
  G4 P{settle_long}

[gcode_macro _OPTIMIZED_HOME_Z_FROM_SAFE_POINT]
description: Requests optimized Z homing through the active homing override.
gcode:
  G28 Z

[gcode_macro _OPTIMIZED_HOME_Z_FROM_SAFE_POINT_RAW]
description: Moves to the Z homing point, homes Z, and lifts clear.
gcode:
  {% set default_accel = printer.configfile.settings.printer.max_accel|float %}
  SET_VELOCITY_LIMIT ACCEL=10000
  _OPTIMIZED_MOVE_TO_Z_HOME_POINT
  M400
  SET_VELOCITY_LIMIT ACCEL=500
  G28.6245197 Z
  G91
  G1 Z10 F480
  G90
  M400
  SET_VELOCITY_LIMIT ACCEL={default_accel}

[homing_override]
gcode:
  {% set opt = printer["gcode_macro _tltg_optimized_globals"] %}
  {% set default_accel = printer.configfile.settings.printer.max_accel|float %}
  {% set settle_long = opt.homing_settle_long|int %}
  {% set homed = printer.toolhead.homed_axes|lower %}
  {% set status = params.STATUS|default("homing") %}
  {% set lazy = params.LAZY|default(('O' in params)|int)|int %}
  {% if params.AXES is defined %}
    {% set axes = 'XYZ'|select('in', params.AXES|upper|list)|join() %}
  {% else %}
    {% set axes = 'XYZ'|select('in', params)|join() %}
  {% endif %}
  {% if not axes %}
    {% set axes = 'XYZ' %}
  {% endif %}
  {% if lazy %}
    {% set axes = axes|reject('in', printer.toolhead.homed_axes|upper)|join() %}
  {% endif %}

  {% if axes %}
    SET_PRINT_SUB_STATUS SUB_STATUS={status}
    {% set has_x = 'X' in axes %}
    {% set has_y = 'Y' in axes %}
    {% set has_z = 'Z' in axes %}
    {% set xy_homed = 'x' in homed and 'y' in homed %}
    {% set full_home = has_x and has_y and has_z %}
    {% set xy_home = has_x and has_y and not has_z %}
    {% set x_only = has_x and not has_y and not has_z %}
    {% set y_only = has_y and not has_x and not has_z %}
    {% set z_only = has_z and not has_x and not has_y %}
    {% set z_needs_full = z_only and not xy_homed %}
    M400
    EXIT_ENFORCE_MODE STEPPER=x
    G4 P{settle_long}
    EXIT_ENFORCE_MODE STEPPER=y
    G4 P{settle_long}
    BED_MESH_CLEAR
    SET_VELOCITY_LIMIT ACCEL=500
    M220 S100
    SET_STEPPER_ENABLE STEPPER=extruder enable=0
    {% if full_home or z_needs_full %}
      _OPTIMIZED_PREP_XY_HOME SET_Z=1 MOVE_Z=5 MOVE_X=-5 MOVE_Y=5
      _OPTIMIZED_HOME_Y_AND_BACKOFF
      _OPTIMIZED_HOME_X_AND_BACKOFF
      _OPTIMIZED_RESTORE_XY_HOMING_STATE
      _OPTIMIZED_HOME_Z_FROM_SAFE_POINT_RAW
    {% endif %}

    {% if xy_home %}
      _OPTIMIZED_PREP_XY_HOME MOVE_X=-5 MOVE_Y=5
      _OPTIMIZED_HOME_Y_AND_BACKOFF
      _OPTIMIZED_HOME_X_AND_BACKOFF
      _OPTIMIZED_RESTORE_XY_HOMING_STATE
    {% endif %}

    {% if y_only %}
      _OPTIMIZED_PREP_XY_HOME MOVE_Y=5
      _OPTIMIZED_HOME_Y_AND_BACKOFF
      _OPTIMIZED_RESTORE_XY_HOMING_STATE
    {% endif %}

    {% if x_only %}
      _OPTIMIZED_PREP_XY_HOME MOVE_X=-5 MOVE_Y=5
      _OPTIMIZED_HOME_X_AND_BACKOFF
      _OPTIMIZED_RESTORE_XY_HOMING_STATE
    {% endif %}

    {% if z_only and xy_homed %}
      _OPTIMIZED_HOME_Z_FROM_SAFE_POINT_RAW
    {% endif %}

    {% if not (full_home or z_needs_full or xy_home or x_only or y_only or z_only) %}
      {action_raise_error("Unsupported homing axis combination. Supported requests are full home, XY, or single-axis X/Y/Z.")}
    {% endif %}
    SET_VELOCITY_LIMIT ACCEL={default_accel}
  {% endif %}

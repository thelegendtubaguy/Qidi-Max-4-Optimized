# Optimized Z offset handling

[gcode_macro _km_apply_print_offset]
description: Applies, captures, or saves the print Z offset.
variable_captured_z_offset: 0.0
variable_captured_z_offset_valid: 0
gcode:
  {% if params.RESET|default(0)|int %}
    {% set z = printer.save_variables.variables.z_offset|default(0)|float %}
    SET_GCODE_VARIABLE MACRO=_km_apply_print_offset VARIABLE=captured_z_offset VALUE={z}
    SET_GCODE_VARIABLE MACRO=_km_apply_print_offset VARIABLE=captured_z_offset_valid VALUE=1
    SET_GCODE_OFFSET Z=0 MOVE=0
  {% elif params.SET|default(0)|int %}
    {% if captured_z_offset_valid|int %}
      {% set z = captured_z_offset|float %}
    {% else %}
      {% set z = printer.save_variables.variables.z_offset|default(0)|float %}
    {% endif %}
    {action_respond_info("Your Z Offset will be set to: %.3f" % z)}
    SET_GCODE_OFFSET Z={z} MOVE=0
  {% elif params.SAVE|default(0)|int %}
    {% if printer.gcode_move.homing_origin.z < 0.5 %}
      SAVE_VARIABLE VARIABLE=z_offset VALUE={printer.gcode_move.homing_origin.z}
    {% endif %}
  {% endif %}

# Optimized-only globals that must stay out of stock-mapped files

[gcode_macro _tltg_optimized_globals]
variable_package_version: "26.04.21.1"
variable_keep_loaded_between_prints: True
variable_homing_settle_short: 20
variable_homing_settle_long: 50
variable_z_home_randomize_enable: True
variable_z_home_randomize_radius: 6
variable_move_to_z_travel_speed_xy: 40000
gcode:

[delayed_gcode _tltg_optimized_startup_banner]
initial_duration: 6
gcode:
  {% set opt = printer["gcode_macro _tltg_optimized_globals"] %}
  {action_respond_info("TLTG Optimized Configs Installed v%s" | format(opt.package_version))}
